<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="1920" height="1280" font-family="'Noto Sans KR','Noto Sans',sans-serif" fill="#10243f">
<rect width="960" height="640" fill="#ffffff"/>
<defs>
<marker id="arrOut" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M1,1 L7.5,4 L1,7" fill="none" stroke="#6B9AD1" stroke-width="1.6"/></marker>
</defs>

<text x="40" y="42" font-size="21" font-weight="700" fill="#163a73">Player 평가 퍼널 — 보안 → 성능 순으로 좁혀 추천</text>
<text x="40" y="66" font-size="13" fill="#5b6b7d">03의 14개 카테고리 후보를 위에서 아래로 걸러 남는 것을 순위로 세운다</text>

<!-- B1 후보 풀 -->
<polygon points="200,90 760,90 732,158 228,158" fill="#79C3E8" stroke="#3F9BD4" stroke-width="1.5"/>
<text x="480" y="118" font-size="15" font-weight="700" fill="#0b3a52" text-anchor="middle">후보 풀 · 14개 카테고리 × 5개 내외 ≈ 약 60개 Player</text>
<text x="480" y="140" font-size="12" fill="#0b3a52" text-anchor="middle">03 §3 후보 표가 입력</text>

<!-- B2 보안 게이트 -->
<polygon points="233,170 727,170 700,238 260,238" fill="#3F9BD4" stroke="#2456A4" stroke-width="1.5"/>
<text x="480" y="198" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">1) 보안 게이트 (통과 / 탈락)</text>
<text x="480" y="220" font-size="12" fill="#eaf4fb" text-anchor="middle">하나라도 미충족이면 여기서 탈락</text>

<!-- B3 성능 30점 -->
<polygon points="265,250 695,250 667,318 293,318" fill="#2456A4" stroke="#163a73" stroke-width="1.5"/>
<text x="480" y="278" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">2) 성능 30점 (3 Pillar × 10 지표)</text>
<text x="480" y="300" font-size="12" fill="#dbe6f5" text-anchor="middle">통과한 후보만 채점</text>

<!-- B4 20점 컷 -->
<polygon points="298,330 662,330 635,398 325,398" fill="#3F9BD4" stroke="#2456A4" stroke-width="1.5"/>
<text x="480" y="358" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">3) 20점 컷</text>
<text x="480" y="380" font-size="12" fill="#eaf4fb" text-anchor="middle">성능 30점 중 20점 미만은 후순위</text>

<!-- B5 White-List / 추천 -->
<polygon points="330,410 630,410 602,478 358,478" fill="#4FA47D" stroke="#2f6b50" stroke-width="1.5"/>
<text x="480" y="438" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">White-List · 추천</text>
<text x="480" y="460" font-size="12" fill="#e5f2ec" text-anchor="middle">단위별 우선순위 + 환경별 1순위</text>

<!-- Drop-out callouts (right) -->
<line x1="714" y1="204" x2="792" y2="204" stroke="#6B9AD1" stroke-width="1.6" marker-end="url(#arrOut)"/>
<rect x="795" y="180" width="150" height="52" rx="8" fill="#E7EEF6" stroke="#6B9AD1" stroke-width="1.3" stroke-dasharray="4 3"/>
<text x="870" y="200" font-size="12" font-weight="700" fill="#3a4a5c" text-anchor="middle">Black-List (사용 제한)</text>
<text x="870" y="218" font-size="12" fill="#5b6b7d" text-anchor="middle">보안 미충족·CVSS≥7.0</text>

<line x1="649" y1="364" x2="792" y2="364" stroke="#6B9AD1" stroke-width="1.6" marker-end="url(#arrOut)"/>
<rect x="795" y="340" width="150" height="52" rx="8" fill="#E7EEF6" stroke="#6B9AD1" stroke-width="1.3" stroke-dasharray="4 3"/>
<text x="870" y="360" font-size="12" font-weight="700" fill="#3a4a5c" text-anchor="middle">후순위</text>
<text x="870" y="378" font-size="12" fill="#5b6b7d" text-anchor="middle">성능 20점 미만</text>

<!-- Bottom note -->
<text x="40" y="536" font-size="12.5" fill="#5b6b7d">순위는 카테고리(솔루션 단위) 안에서만 매긴다 — 카탈로그 플랫폼끼리, 품질·관측 도구끼리 각각.</text>
<text x="40" y="558" font-size="12.5" fill="#5b6b7d">결과는 03 §3 빈 점수 칸을 채우고, 2층 정본 01 Tech Stack 비교의 정성 판정을 정량으로 뒷받침한다.</text>
</svg>
