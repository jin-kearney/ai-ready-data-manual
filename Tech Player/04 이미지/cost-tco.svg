<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif" fill="#10243f">
<rect width="900" height="480" fill="#ffffff"/>
<defs>
<marker id="arrC" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M1,1 L7.5,4 L1,7" fill="none" stroke="#2456A4" stroke-width="1.8"/></marker>
</defs>

<text x="40" y="40" font-size="20" font-weight="700" fill="#163a73">비용 평가 3점 — 3년 총소유비용(TCO)</text>
<text x="40" y="63" font-size="12.5" fill="#5b6b7d">월별 6개 항목을 3년치로 누적(인플레이션·할인 반영)한 뒤, 로그·정규화로 3점 척도에 얹는다.</text>

<!-- 6 monthly items legend box -->
<rect x="40" y="82" width="300" height="360" rx="9" fill="#EEF4FB" stroke="#6B9AD1" stroke-width="1.2"/>
<text x="60" y="108" font-size="14" font-weight="700" fill="#163a73">월별 비용 6항목</text>
<text x="60" y="138" font-size="12" fill="#334b63">① 라이선스 (OSS = 0)</text>
<text x="60" y="166" font-size="12" fill="#334b63">② 인프라 (사용량 배율 ×2.5)</text>
<text x="60" y="194" font-size="12" fill="#334b63">③ API·사용량 (배율 ×3)</text>
<text x="76" y="214" font-size="10.5" fill="#b04a2f">└ 데이터 준비용: 토큰 → 처리 데이터량</text>
<text x="60" y="242" font-size="12" fill="#334b63">④ 운영 FTE (관리형 0.2 / OSS 0.3)</text>
<text x="60" y="270" font-size="12" fill="#334b63">⑤ 초기도입 (PoC·이관·교육, 1회)</text>
<text x="60" y="298" font-size="12" fill="#334b63">⑥ 숨은비용 ((인프라+API)×15%)</text>
<line x1="60" y1="318" x2="320" y2="318" stroke="#c3d2e2" stroke-width="1"/>
<text x="60" y="344" font-size="12" font-weight="700" fill="#163a73">= 월 소계</text>
<text x="60" y="372" font-size="11.5" fill="#5b6b7d">AXC 산식·정규화 그대로.</text>
<text x="60" y="392" font-size="11.5" fill="#5b6b7d">③ 파라미터만 데이터량으로 교체.</text>
<text x="60" y="418" font-size="11.5" fill="#5b6b7d">Medium 시나리오에 온프렘 케이스</text>
<text x="60" y="434" font-size="11.5" fill="#5b6b7d">반드시 포함(망분리 비중).</text>

<!-- Stacked 3-year bar -->
<text x="500" y="120" font-size="13.5" font-weight="700" fill="#163a73" text-anchor="middle">3년 누적 TCO</text>
<!-- bar bottom y=400, segments upward -->
<rect x="430" y="330" width="140" height="70" fill="#79C3E8" stroke="#3F9BD4" stroke-width="1.2"/>
<text x="500" y="360" font-size="12.5" font-weight="700" fill="#0b3a52" text-anchor="middle">1년차</text>
<text x="500" y="378" font-size="10.5" fill="#0b3a52" text-anchor="middle">월소계 × 12</text>

<rect x="430" y="268" width="140" height="62" fill="#3F9BD4" stroke="#2456A4" stroke-width="1.2"/>
<text x="500" y="294" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">2년차</text>
<text x="500" y="312" font-size="10.5" fill="#eaf4fb" text-anchor="middle">×1.03 ×0.95</text>

<rect x="430" y="212" width="140" height="56" fill="#2456A4" stroke="#163a73" stroke-width="1.2"/>
<text x="500" y="236" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">3년차</text>
<text x="500" y="254" font-size="10.5" fill="#dbe6f5" text-anchor="middle">×1.03² ×0.90</text>

<rect x="430" y="170" width="140" height="42" fill="#B7CDE6" stroke="#6B9AD1" stroke-width="1.2"/>
<text x="500" y="196" font-size="12" font-weight="700" fill="#10243f" text-anchor="middle">초기도입 (1회)</text>

<!-- arrow to normalization -->
<line x1="574" y1="247" x2="616" y2="247" stroke="#2456A4" stroke-width="1.8" marker-end="url(#arrC)"/>

<!-- normalization + score -->
<rect x="620" y="212" width="240" height="70" rx="9" fill="#DCE8F5" stroke="#2456A4" stroke-width="1.3"/>
<text x="740" y="240" font-size="12.5" font-weight="700" fill="#163a73" text-anchor="middle">log(TCO) 정규화</text>
<text x="740" y="262" font-size="11" fill="#5b6b7d" text-anchor="middle">Winsorized Min-Max (P10~P90)</text>

<line x1="740" y1="282" x2="740" y2="316" stroke="#2456A4" stroke-width="1.8" marker-end="url(#arrC)"/>

<rect x="640" y="322" width="200" height="60" rx="10" fill="#4FA47D" stroke="#2f6b50" stroke-width="1.8"/>
<text x="740" y="358" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">비용 = 3점 만점</text>

<text x="740" y="420" font-size="11.5" fill="#5b6b7d" text-anchor="middle">싼 쪽이 높은 점수 — 성능 30점의</text>
<text x="740" y="438" font-size="11.5" fill="#5b6b7d" text-anchor="middle">동점을 가르는 보조 축(10:1 비중)</text>
</svg>
