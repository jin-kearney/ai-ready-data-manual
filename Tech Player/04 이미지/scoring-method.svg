<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" width="1880" height="1040" font-family="'Noto Sans KR','Noto Sans',sans-serif" fill="#10243f">
<rect width="940" height="520" fill="#ffffff"/>
<defs>
<marker id="arrM" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M1,1 L7.5,4 L1,7" fill="none" stroke="#2456A4" stroke-width="1.8"/></marker>
</defs>

<text x="40" y="42" font-size="21" font-weight="700" fill="#163a73">지표 하나를 어떻게 매기나 — 채점 방식</text>
<text x="40" y="66" font-size="13" fill="#5b6b7d">지표별로 두 방식 중 하나. 애매하면 낮게 준다(확인 불가 = 0점).</text>

<!-- Binary -->
<text x="40" y="108" font-size="15" font-weight="700" fill="#2456A4">① Binary — 확인되나 / 안 되나</text>
<rect x="40" y="122" width="380" height="66" rx="9" fill="#E7EEF6" stroke="#6B9AD1" stroke-width="1.3"/>
<text x="88" y="150" font-size="24" font-weight="700" fill="#8595a6" text-anchor="middle">0</text>
<text x="88" y="172" font-size="12" fill="#5b6b7d" text-anchor="middle">확인 불가</text>
<line x1="150" y1="132" x2="150" y2="178" stroke="#c3d2e2" stroke-width="1"/>
<text x="300" y="150" font-size="24" font-weight="700" fill="#2456A4" text-anchor="middle">3</text>
<text x="300" y="172" font-size="12" fill="#2456A4" text-anchor="middle">확인 가능</text>

<!-- Ternary -->
<text x="480" y="108" font-size="15" font-weight="700" fill="#2456A4">② Ternary — 없음 / 부분 / 완전</text>
<rect x="480" y="122" width="420" height="66" rx="9" fill="#E7EEF6" stroke="#6B9AD1" stroke-width="1.3"/>
<text x="540" y="150" font-size="24" font-weight="700" fill="#8595a6" text-anchor="middle">0</text>
<text x="540" y="172" font-size="12" fill="#5b6b7d" text-anchor="middle">미지원</text>
<line x1="620" y1="132" x2="620" y2="178" stroke="#c3d2e2" stroke-width="1"/>
<text x="690" y="150" font-size="24" font-weight="700" fill="#3F9BD4" text-anchor="middle">2</text>
<text x="690" y="172" font-size="12" fill="#3F9BD4" text-anchor="middle">부분 지원</text>
<line x1="760" y1="132" x2="760" y2="178" stroke="#c3d2e2" stroke-width="1"/>
<text x="830" y="150" font-size="24" font-weight="700" fill="#2456A4" text-anchor="middle">3</text>
<text x="830" y="172" font-size="12" fill="#2456A4" text-anchor="middle">완전 지원</text>

<!-- OSS conversion -->
<text x="40" y="242" font-size="15" font-weight="700" fill="#2f6b50">③ 오픈소스(OSS)는 5개만 채점하고 ×2로 환산</text>

<rect x="40" y="262" width="150" height="72" rx="9" fill="#B7CDE6" stroke="#6B9AD1" stroke-width="1.3"/>
<text x="115" y="292" font-size="14" font-weight="700" text-anchor="middle">10개 지표</text>
<text x="115" y="314" font-size="12" fill="#5b6b7d" text-anchor="middle">상용은 전부 채점</text>

<line x1="192" y1="298" x2="238" y2="298" stroke="#2456A4" stroke-width="1.8" marker-end="url(#arrM)"/>

<rect x="240" y="262" width="180" height="72" rx="9" fill="#F1F7F4" stroke="#7CC2A7" stroke-width="1.3"/>
<text x="330" y="288" font-size="13.5" font-weight="700" fill="#2f6b50" text-anchor="middle">◇ 5개 제외</text>
<text x="330" y="308" font-size="12" fill="#1f4d3a" text-anchor="middle">벤더 없어 확인 불가</text>
<text x="330" y="324" font-size="12" fill="#1f4d3a" text-anchor="middle">→ 5개만 채점</text>

<line x1="422" y1="298" x2="468" y2="298" stroke="#2456A4" stroke-width="1.8" marker-end="url(#arrM)"/>

<rect x="470" y="262" width="170" height="72" rx="9" fill="#DCE8F5" stroke="#2456A4" stroke-width="1.3"/>
<text x="555" y="292" font-size="14" font-weight="700" fill="#163a73" text-anchor="middle">5 × 3 = 15점</text>
<text x="555" y="314" font-size="12" fill="#5b6b7d" text-anchor="middle">최대 원점수</text>

<line x1="642" y1="298" x2="688" y2="298" stroke="#2456A4" stroke-width="1.8" marker-end="url(#arrM)"/>

<rect x="690" y="262" width="210" height="72" rx="9" fill="#2456A4" stroke="#163a73" stroke-width="1.8"/>
<text x="795" y="292" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">× 2 = 30점</text>
<text x="795" y="314" font-size="12" fill="#dbe6f5" text-anchor="middle">상용과 같은 30점 척도</text>

<!-- Note -->
<rect x="40" y="368" width="860" height="120" rx="9" fill="#EEF4FB" stroke="#6B9AD1" stroke-width="1.2"/>
<text x="60" y="396" font-size="13.5" font-weight="700" fill="#163a73">데이터 준비용으로 바꾼 곳은 성능에서 딱 한 군데</text>
<text x="60" y="422" font-size="12.5" fill="#334b63">· P2·CI1 표준 프로토콜 목록에 데이터 연계 표준을 추가 인정: JDBC/ODBC · CDC · SFTP · CSV/JSON/Parquet.</text>
<text x="60" y="446" font-size="12.5" fill="#334b63">· 채점 로직(둘 중 충족 수)과 배점은 그대로. 나머지 9개 지표는 AXC 원안 그대로 쓴다.</text>
<text x="60" y="470" font-size="12.5" fill="#334b63">· 레퍼런스(P1·CI2)의 분석기관 등재는 Data Quality·Metadata·Data Integration 등 데이터 카테고리 MQ로 본다.</text>
</svg>
