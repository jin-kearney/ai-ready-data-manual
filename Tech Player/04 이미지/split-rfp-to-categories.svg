<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 790" font-family="-apple-system,'Malgun Gothic','Apple SD Gothic Neo',sans-serif" fill="#10243f">
<rect width="1020" height="790" fill="#ffffff"/>
