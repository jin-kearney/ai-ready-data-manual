<text x="36" y="40" font-size="21" font-weight="700" fill="#163a73">0단계 — RFP 5영역을 14개 솔루션 카테고리로 나눈다</text>
<text x="36" y="64" font-size="13" fill="#5b6b7d">한 제품이 여러 주제를 함께 커버하면 <tspan font-weight="700" fill="#2f6b50">통합(1개)</tspan>, 한 제품으로 다 못 하면 <tspan font-weight="700" fill="#2456A4">분리(N개)</tspan>. 이렇게 나온 카테고리가 조사·채점 단위다.</text>

<!-- column headers -->
<text x="154" y="88" font-size="12" font-weight="700" fill="#5b6b7d" text-anchor="middle">RFP 5영역</text>
<text x="360" y="88" font-size="12" font-weight="700" fill="#5b6b7d" text-anchor="middle">통합 / 분리</text>
<text x="725" y="88" font-size="12" font-weight="700" fill="#5b6b7d" text-anchor="middle">솔루션 카테고리 (조사 단위)</text>

