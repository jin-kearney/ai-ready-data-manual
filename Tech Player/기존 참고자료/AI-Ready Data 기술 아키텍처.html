<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Ready Data 기술 아키텍처</title>
<style>
  :root{
    --p1:#2563eb; --g2:#7c3aed; --g3:#0d9488; --g4:#0891b2;
    --g6:#16a34a; --g7:#e11d48; --g8:#475569;
    --infra:#64748b; --src:#334155;
    --ingest:#94a3b8; --serve:#0284c7; --feedback:#f59e0b; --base:#64748b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#f1f5f9; color:#1e293b;}
  header{position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid #e2e8f0; padding:10px 18px;}
  header h1{font-size:17px; display:inline-block; margin-right:14px;}
  header .sub{font-size:11.5px; color:#64748b;}
  .toolbar{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:8px;}
  .btn{font-size:11.5px; padding:4px 10px; border:1px solid #cbd5e1; border-radius:14px; background:#fff; cursor:pointer; color:#334155;}
  .btn:hover{background:#f1f5f9;}
  .btn.active{background:#1e293b; color:#fff; border-color:#1e293b;}
  .sep{width:1px; height:18px; background:#e2e8f0; margin:0 4px;}
  .chip{font-size:11px; padding:3px 9px; border-radius:12px; cursor:pointer; border:1.5px solid; background:#fff; font-weight:600;}
  .edge-legend{display:flex; gap:14px; margin-top:7px; font-size:11px; color:#475569; align-items:center; flex-wrap:wrap;}
  .edge-legend span{display:inline-flex; align-items:center; gap:5px;}
  .li{display:inline-block; width:26px; height:0; border-top:2.5px solid;}
  #viewport{overflow:auto; height:calc(100vh - 110px);}
  #canvas{position:relative; width:1720px; height:1330px; transform-origin:0 0;}
  .band-label{position:absolute; font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:.5px; z-index:2;}
  .zone-label{position:absolute; font-size:10.5px; font-weight:700; color:#64748b; z-index:3;}
  svg#edges{position:absolute; top:0; left:0; pointer-events:none; z-index:1;}
  svg#edges path{fill:none; transition:opacity .15s, stroke-width .15s;}
  svg#edges path.dim{opacity:.12;}
  svg#edges path.hl{stroke-width:3.2 !important; opacity:1 !important;}
  svg#edges text{font-size:10.5px; fill:#334155; paint-order:stroke; stroke:#f8fafc; stroke-width:3px; font-weight:600; opacity:0; transition:opacity .15s;}
  svg#edges text.show{opacity:1;}
  .gbox{position:absolute; border:1.8px dashed; border-radius:10px; z-index:2; cursor:pointer; background:rgba(255,255,255,.35);}
  .gbox.solidbg{background:rgba(239,246,255,.55);}
  .gbox.modbox{border-style:solid; border-width:1.4px; background:rgba(255,255,255,.6); border-radius:8px;}
  .gbox.modbox .gtitle{font-size:10.5px;}
  .gbox.modbox .gsol{font-size:9px;}
  .gbox .gtitle{position:absolute; top:5px; left:10px; font-size:11.5px; font-weight:800;}
  .gbox .gsol{position:absolute; top:5px; right:10px; font-size:10px; color:#64748b;}
  .gbox.gov{box-shadow:0 0 0 2.5px rgba(147,51,234,.55);}
  .node{position:absolute; background:#fff; border:1px solid #e2e8f0; border-left:4px solid; border-radius:8px;
        padding:6px 8px; cursor:pointer; z-index:3; box-shadow:0 1px 2px rgba(15,23,42,.08);
        transition:box-shadow .15s, transform .15s, opacity .15s;}
  .node:hover{box-shadow:0 4px 10px rgba(15,23,42,.18); transform:translateY(-1px);}
  .node.dim{opacity:.28;}
  .node.selected{box-shadow:0 0 0 3px rgba(30,41,59,.55), 0 4px 12px rgba(15,23,42,.25);}
  .node.nbr{box-shadow:0 0 0 2.5px rgba(2,132,199,.45);}
  .node.gov{box-shadow:0 0 0 2.5px rgba(147,51,234,.55);}
  .node .code{display:inline-block; font-size:9.5px; font-weight:800; color:#fff; border-radius:4px; padding:1px 5px; margin-bottom:2px;}
  .node .nm{font-size:12px; font-weight:700; line-height:1.22;}
  .node .so{font-size:9.5px; color:#64748b; margin-top:2px; line-height:1.3;}
  .node.infra{background:#f8fafc;}
  .node.srcn{background:#1e293b; border-color:#0f172a; color:#f1f5f9;}
  .node.srcn .nm{color:#f8fafc;}
  .node.srcn .so{color:#94a3b8;}
  .node.infb{background:#eef2f7; border-style:solid; border-color:#cbd5e1; border-left:4px solid #64748b;}
  .node.gapn{background:#fff7ed; border:1.6px dashed #f59e0b; border-left:4px solid #f59e0b;}
  .node.gapn .nm{color:#b45309;}
  /* 레벨링 패널 */
  #lvpanel{position:absolute; z-index:3; background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:12px 14px; font-size:11px; line-height:1.55; box-shadow:0 1px 3px rgba(15,23,42,.1);}
  #lvpanel h4{font-size:12px; margin-bottom:6px;}
  #lvpanel .lv{margin-bottom:9px;}
  #lvpanel .lvt{font-weight:800; font-size:11px;}
  #lvpanel .lvd{color:#475569;}
  #lvpanel .ord{margin-top:4px; padding-top:8px; border-top:1px dashed #e2e8f0; color:#334155;}
  /* 상세 drawer */
  #drawer{position:fixed; top:0; right:-400px; width:390px; height:100vh; background:#fff; z-index:100;
          box-shadow:-6px 0 22px rgba(15,23,42,.18); transition:right .22s ease; display:flex; flex-direction:column;}
  #drawer.open{right:0;}
  #drawer .dh{padding:14px 18px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:flex-start;}
  #drawer .dh h2{font-size:15px; line-height:1.3;}
  #drawer .dh .x{cursor:pointer; font-size:18px; color:#94a3b8; border:none; background:none; padding:2px 6px;}
  #drawer .db{padding:14px 18px; overflow-y:auto; font-size:12.5px; line-height:1.6;}
  #drawer .tag{display:inline-block; font-size:10px; font-weight:700; color:#fff; border-radius:4px; padding:2px 7px; margin-right:5px;}
  #drawer h3{font-size:12px; color:#64748b; margin:14px 0 5px; font-weight:800; letter-spacing:.4px;}
  #drawer ul{padding-left:16px;}
  #drawer li{margin-bottom:4px;}
  #drawer .sol{background:#f1f5f9; border-radius:6px; padding:7px 10px; font-size:12px;}
  .rel-arrow{color:#94a3b8; font-size:11px;}
</style>
</head>
<body>
<header>
  <h1>AI-Ready Data 기술 아키텍처</h1>
  <span class="sub">20개 주제 × 솔루션 레벨링(Lv.1 플랫폼 내장 9개 · Lv.2 전문 솔루션 5종 · Lv.3 LLMOps) = 실질 도입 7종 · 노드/그룹 클릭 시 상세와 연계 강조</span>
  <div class="toolbar">
    <button class="btn mode active" data-mode="all">전체 흐름</button>
    <button class="btn mode" data-mode="ingest">① 데이터 정비 흐름</button>
    <button class="btn mode" data-mode="serve">② AI 활용 흐름</button>
    <button class="btn mode" data-mode="feedback">③ 피드백 루프</button>
    <div class="sep"></div>
    <button class="btn" id="lblBtn">라벨 표시</button>
    <div class="sep"></div>
    <button class="btn" id="zo">−</button>
    <button class="btn" id="zr">100%</button>
    <button class="btn" id="zi">＋</button>
    <div class="sep"></div>
    <span id="chips"></span>
  </div>
  <div class="edge-legend">
    <span><span class="li" style="border-color:var(--ingest)"></span>데이터 수집·정비</span>
    <span><span class="li" style="border-color:var(--serve)"></span>AI·사용자 활용</span>
    <span><span class="li" style="border-color:var(--feedback); border-top-style:dashed"></span>피드백 루프</span>
    <span><span class="li" style="border-color:var(--base); border-top-style:dotted"></span>인프라 기반 제공</span>
    <span style="color:#9333ea; font-weight:700">■ 보라 테두리</span><span style="margin-left:-8px">= 클릭한 블록의 적용·지원 범위</span>
  </div>
</header>
<div id="viewport"><div id="canvas">
  <svg id="edges" width="1720" height="1330">
    <defs id="mdefs"></defs>
  </svg>
</div></div>
<aside id="drawer">
  <div class="dh"><h2 id="dTitle">상세</h2><button class="x" onclick="closeDrawer()">✕</button></div>
  <div class="db" id="dBody"></div>
</aside>

<script>
/* ───────────────────── 솔루션 레벨링 그룹 ───────────────────── */
const GROUPS = {
  p1:{name:'Lv.1 통합 데이터 플랫폼 (내장)', raw:'#2563eb',
      sol:'Databricks(Unity Catalog) · Snowflake(Horizon) · MS Fabric(Purview) 중 택 1 — 1개 솔루션',
      topics:'A-1 카탈로그 · A-2 메타데이터 · A-3 Glossary · C-3 Lineage · E-1 Data Product · C-1 Observability(기본) · C-2 품질/접근제어 · F-1 DataOps · F-2 생애주기 (9개 주제)',
      desc:'현대 Lakehouse 플랫폼은 저장 엔진만이 아니라 카탈로그·메타데이터·용어집·컬럼 레벨 리니지·마켓플레이스·RBAC/ABAC·품질 검증·워크플로·스토리지 생애주기를 한 제품 안에 내장한다. 9개 주제는 별도 솔루션 구매 없이 플랫폼 하나로 시작하는 것이 정답이며, 그룹 규모가 커지면 전문 솔루션(Collibra, Monte Carlo 등)으로 선택 보강한다.'},
  g2:{name:'Lv.2 지식그래프', raw:'#7c3aed',
      sol:'Neo4j · Ontotext GraphDB · AWS Neptune (RDF/OWL · Cypher · GraphRAG)',
      topics:'B-3 온톨로지',
      desc:'개념 간 관계·계층·인과를 그래프로 저장·추론하는 영역은 Lakehouse가 제공하지 못하는 유일한 "의미 계층"이다. 별도 Graph DB 스택이 필요하며, 플랫폼 카탈로그의 용어·메타데이터와 양방향 매핑해 GraphRAG·원인분석·추천에 쓴다.'},

      sol:'Unstructured.io · Upstage DP · Azure Document Intelligence · CLOVA OCR · ABBYY',
      topics:'B-1 데이터 전처리 · F-3 데이터 디지털화',
      desc:'비정형→구조화 변환은 문서 AI 전문 영역. 이미 디지털인 문서(B-1)와 종이·수기·암묵지(F-3)는 입구만 다를 뿐 같은 파싱·OCR 기술을 쓴다. 산출물은 플랫폼의 Vector Search·테이블로 적재된다.'},
  g4:{name:'Lv.2 학습데이터 팩토리', raw:'#0891b2',
      sol:'Label Studio · CVAT · Encord / SDV · Gretel · 시뮬레이터',
      topics:'B-2 데이터 해설/주석 · E-2 합성데이터',
      desc:'AI 학습데이터를 "만드는" 도구군. 사람이 의미를 부여하는 라벨링(B-2)과 기계가 부족분을 생성하는 합성(E-2)은 모두 플랫폼의 학습·평가 데이터셋 저장소로 산출물을 보낸다.'},
  g6:{name:'Lv.2 OT/IoT 수집', raw:'#16a34a',
      sol:'Kafka · AVEVA PI · Azure IoT Hub · Edge Gateway',
      topics:'D-1 Physical 데이터',
      desc:'공장 OT 데이터는 프로토콜·시간 동기화·Edge 처리 특성 때문에 플랫폼 내장 커넥터만으로 부족하다. 산업용 수집 스택으로 표준화해 플랫폼에 적재한다.'},
  g7:{name:'Lv.3 LLMOps · Agent Ops', raw:'#e11d48',
      sol:'MCP · LangSmith · Langfuse · promptfoo · Ragas — 1개 스택',
      topics:'D-2 API/Tool 연계 · D-3 Prompt/Harness · E-3 AI 평가 데이터 · E-4 Feedback Loop',
      desc:'AI Agent 실행을 둘러싼 운영 스택. Tool 명세(MCP), Prompt 자산, 평가, 피드백 환류는 데이터 플랫폼이 아닌 LLMOps 플랫폼에서 함께 관리된다. Agent 운영을 시작하는 시점에 도입한다.'},
  g8:{name:'Lv.2 보안 전문', raw:'#475569',
      sol:'MS Presidio · BigID · Protegrity (플랫폼 기본 마스킹 + 전문 보강)',
      topics:'F-4 AI 데이터 보안',
      desc:'플랫폼의 컬럼 마스킹·태깅은 정형 데이터까지만 커버한다. 문서·Prompt·Agent 로그 등 비정형 전반의 민감정보 탐지·가명화는 전문 솔루션으로 보강해 전 구간에 횡단 적용한다.'},
};

/* ───────────────────── 노드 ───────────────────── */
const NODES = [
  /* ⑤ 활용 */
  {id:'user', x:200,y:50,w:260,h:80, grp:'infra', code:'사용자', nm:'현업 · 분석가 · 경영진', so:'포털 · BI · 챗 UI',
   d:'AI Agent에 질의하고, 플랫폼 카탈로그에서 데이터를 탐색하며, Agent의 고위험 작업을 승인하는 최종 사용자.'},
  {id:'agent', x:640,y:50,w:320,h:80, grp:'infra', code:'AI', nm:'AI Agent · Copilot · 챗봇', so:'LLM + RAG + Tool 호출 + Harness 실행',

  /* ④ AI 서빙 */
  {id:'rag', x:60,y:240,w:260,h:90, grp:'infra', code:'서빙', nm:'RAG 검색 서비스', so:'하이브리드 검색 + GraphRAG + Reranking',
   d:'플랫폼 Vector Search의 벡터 검색과 지식그래프(B-3)의 관계 추론을 결합해 Agent에 근거를 제공하는 검색 계층. Glossary(A-3)로 현장 용어를 표준 용어로 변환해 검색 정확도를 높인다.'},
  {id:'d3', x:400,y:240,w:200,h:90, grp:'g7', code:'D-3', nm:'Prompt/Harness 자산화', so:'Prompt Registry · 버전관리',
   d:'업무 절차·판단 기준을 Prompt와 Harness(Prompt+데이터+Tool 순서+출력 포맷 패키지)로 구조화. 버전 관리와 데이터·Tool 의존성 맵을 관리한다.'},
  {id:'d2', x:620,y:240,w:200,h:90, grp:'g7', code:'D-2', nm:'API/Tool 연계 (MCP)', so:'Tool Registry · Schema · 호출 로그',
   d:'Agent가 외부 시스템·Tool을 안전하게 호출하도록 기능·입출력·제약을 명세(MCP/OpenAPI). 조회/추천/실행/외부전송 위험등급을 나누고 Tool 버전과 호출 로그를 관리한다. 플랫폼의 Data Product(E-1)도 Tool로 등록되어 Agent가 소비한다.'},
  {id:'e3', x:840,y:240,w:200,h:90, grp:'g7', code:'E-3', nm:'AI 평가 데이터', so:'Gold Dataset · Rubric · 회귀테스트',
   d:'기준 질문·기대 답변·정답 근거·평가 Rubric으로 구성된 Gold Dataset. 모델·Prompt 변경 전후 성능 비교와 회귀 테스트에 사용. 전문가 판단을 구조화해 축적한다.'},
  {id:'e4', x:1060,y:240,w:240,h:90, grp:'g7', code:'E-4', nm:'데이터 Feedback Loop', so:'오류 Taxonomy · 개선 Backlog',
   d:'Agent 실행 결과·사용자 수정·Tool 실패를 수집해 원인을 분류(데이터/Prompt/모델/Tool/권한)하고 각 영역으로 환류: 데이터 누락→플랫폼 거버넌스 정비, 라벨 부족→B-2, 평가 실패→E-3, Prompt 문제→D-3, Tool 문제→D-2.'},

   d:'업무 개념(제품·공정·결함·원인·조치) 간 관계·계층·인과를 그래프로 정의. 플랫폼 카탈로그의 Glossary 용어·메타데이터 필드·SOP/PFMEA 문서를 개념에 연결하고, GraphRAG·원인분석·유사사례 추천에 활용한다. Lakehouse가 못 하는 유일한 의미 계층이라 별도 Graph DB로 구축한다.'},
  /* ③ 통합 플랫폼 내부 — 유형① 의미 관리 모듈 */
  {id:'a1', x:330,y:490,w:150,h:80, grp:'p1', mc:'#2563eb', mod:'유형① 의미 관리', code:'A-1', nm:'데이터 카탈로그', so:'자산 등록·검색 (내장)',

function anchor(n, side, f){
  f = (f===undefined)? .5 : f;
  if(side==='top')    return [n.x+n.w*f, n.y];
  if(side==='bottom') return [n.x+n.w*f, n.y+n.h];
  if(side==='left')   return [n.x, n.y+n.h*f];
  return [n.x+n.w, n.y+n.h*f];
}
function normal(side){return side==='top'?[0,-1]:side==='bottom'?[0,1]:side==='left'?[-1,0]:[1,0];}

EDGES.forEach((e,i)=>{
  e.id='edge'+i;
  let d, mid;
  if(e.pts){
    d='M'+e.pts.map(p=>p.join(',')).join(' L');
    const seg=e.pts[Math.floor(e.pts.length/2)-1], seg2=e.pts[Math.floor(e.pts.length/2)];
    mid=[(seg[0]+seg2[0])/2,(seg[1]+seg2[1])/2];
  } else {
    const fn=nodeMap[e.f], tn=nodeMap[e.t];
    const a=anchor(fn,e.fs,e.ff), b=anchor(tn,e.ts,e.ts_f);
    const k=Math.max(34, Math.hypot(b[0]-a[0],b[1]-a[1])*0.32);
    const nf=normal(e.fs), nt=normal(e.ts);
    d=`M${a[0]},${a[1]} C${a[0]+nf[0]*k},${a[1]+nf[1]*k} ${b[0]+nt[0]*k},${b[1]+nt[1]*k} ${b[0]},${b[1]}`;
    mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];
  }
  const path=document.createElementNS(NS,'path');
  path.setAttribute('d',d); path.setAttribute('id',e.id);
  let col=getComputedStyle(document.documentElement).getPropertyValue('--'+e.type).trim();
  path.setAttribute('stroke',col);
  path.setAttribute('stroke-width', e.type==='serve'?2.4:2);
  if(e.type==='feedback') path.setAttribute('stroke-dasharray','7 5');
  if(e.type==='base'){path.setAttribute('stroke-dasharray','2.5 4'); path.setAttribute('stroke-width','1.7');}
  path.setAttribute('marker-end',`url(#arr_${e.type})`);
  if(e.f==='gap_paper'){path.setAttribute('stroke','#f59e0b'); path.setAttribute('marker-end','url(#arr_feedback)');}
  if(e.bidir) path.setAttribute('marker-start',`url(#arr_${e.type}S)`);
  svg.appendChild(path);

  tx.setAttribute('x',mid[0]); tx.setAttribute('y',mid[1]-5); tx.setAttribute('text-anchor','middle');

  svg.appendChild(tx);
  e.pathEl=path; e.lblEl=tx;
});

let mode='all', labelsOn=false, selected=null;

function resetClasses(){
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('dim','selected','nbr','gov'));
  document.querySelectorAll('.gbox').forEach(el=>el.classList.remove('gov'));
  document.querySelectorAll('.chip').forEach(el=>{el.classList.remove('active'); el.style.background='#fff'; el.style.color=GROUPS[el.dataset.gid].raw;});
  EDGES.forEach(e=>{e.pathEl.classList.remove('hl'); e.lblEl.classList.toggle('show',labelsOn);});
  applyMode();
}
function applyMode(){
  EDGES.forEach(e=>{
    const visible = (mode==='all') || e.type===mode || (mode==='ingest'&&e.type==='base');
    e.pathEl.classList.toggle('dim', !visible);
    if(!visible) e.lblEl.classList.remove('show');
  });
}
function selectNode(id){
  resetClasses(); selected=id;
  const n=nodeMap[id];
  document.getElementById('el_'+id).classList.add('selected');
  document.querySelectorAll('.node').forEach(el=>{if(el.id!=='el_'+id)el.classList.add('dim');});
  const rels={in:[],out:[]};
  EDGES.forEach(e=>{
    if(e.f===id||e.t===id){
      e.pathEl.classList.add('hl'); e.pathEl.classList.remove('dim'); e.lblEl.classList.add('show');
      const other=e.f===id?e.t:e.f;
      const oel=document.getElementById('el_'+other);
      if(oel){oel.classList.remove('dim'); oel.classList.add('nbr');}
      (e.t===id?rels.in:rels.out).push({other, lb:e.lb});
    }
  });
  if(n.gov){
    n.gov.forEach(g=>{const el=document.getElementById('el_'+g); if(el){el.classList.remove('dim'); el.classList.add('gov');}});
  }
  openDrawer(n, rels);
}
function selectGroup(gid){
  resetClasses(); selected='grp:'+gid;
  const g=GROUPS[gid];
  document.querySelectorAll('.node').forEach(el=>el.classList.add('dim'));
  NODES.filter(n=>n.grp===gid).forEach(n=>{
    const el=document.getElementById('el_'+n.id); el.classList.remove('dim'); el.classList.add('nbr');
  });
  const chip=document.querySelector(`.chip[data-gid="${gid}"]`);
  if(chip){chip.classList.add('active'); chip.style.background=g.raw; chip.style.color='#fff';}
  document.getElementById('dTitle').textContent=g.name;
  document.getElementById('dBody').innerHTML=
    `<span class="tag" style="background:${g.raw}">${g.name}</span>
     <h3>포함 주제</h3><div>${g.topics}</div>
     <h3>솔루션 / 기술 스택</h3><div class="sol">${g.sol}</div>
     <h3>왜 이 레벨·그룹인가</h3><div>${g.desc}</div>`;
  document.getElementById('drawer').classList.add('open');
}
function selectModule(b){
  resetClasses(); selected='mod:'+b.id;
  document.querySelectorAll('.node').forEach(el=>el.classList.add('dim'));
  b.members.forEach(m=>{
    const el=document.getElementById('el_'+m); if(el){el.classList.remove('dim'); el.classList.add('nbr');}
  });
  const mems=b.members.map(m=>{const t=nodeMap[m]; return (t.code&&t.code.includes('-')?t.code+' ':'')+t.nm;}).join(' · ');
  document.getElementById('dTitle').textContent=b.title;
  document.getElementById('dBody').innerHTML=
    `<span class="tag" style="background:#2563eb">Lv.1 플랫폼 내장</span><span class="tag" style="background:${b.color}">${b.title.split(' —')[0]}</span>
     <h3>포함 구성</h3><div>${mems}</div>
     <h3>기능 / 분리·보강 옵션</h3><div class="sol">${b.sol}</div>
     <h3>유형 설명</h3><div>${b.d}</div>`;
  document.getElementById('drawer').classList.add('open');
}
function openDrawer(n, rels){
  const g = n.grp==='infra'?{name:'인프라 구성요소',raw:'#64748b'} :
            n.grp==='infb'?{name:'공통 인프라 계층',raw:'#64748b'} :
            n.grp==='gap'?{name:'디지털화 필요 영역 (F-3 연계)',raw:'#d97706'} :
            n.grp==='src'?{name:'데이터 원본',raw:'#0f172a'} : GROUPS[n.grp];
  let relHtml='';
  const nm=id=>{const t=nodeMap[id]; return t? (t.nm? (t.code&&t.code.includes('-')?t.code+' ':'')+t.nm : (t.title||id)) : id;};
  if(rels.in.length) relHtml+='<h3>들어오는 연계</h3><ul>'+rels.in.map(r=>`<li>${nm(r.other)} <span class="rel-arrow">→ 이 블록</span> · ${r.lb}</li>`).join('')+'</ul>';
  if(rels.out.length) relHtml+='<h3>나가는 연계</h3><ul>'+rels.out.map(r=>`<li><span class="rel-arrow">이 블록 →</span> ${nm(r.other)} · ${r.lb}</li>`).join('')+'</ul>';
  if(n.gov) relHtml+='<h3>적용·지원 범위 (보라색 강조)</h3><ul>'+n.gov.map(g2=>`<li>${nm(g2)}</li>`).join('')+'</ul>';
  document.getElementById('dTitle').textContent=(n.code&&n.code.includes('-')?n.code+' · ':'')+n.nm;
  document.getElementById('dBody').innerHTML=
    `<span class="tag" style="background:${g.raw}">${g.name}</span>${n.mod?`<span class="tag" style="background:${n.mc}">${n.mod}</span>`:''}
     ${n.so?`<h3>기술 스택 / 형태</h3><div class="sol">${n.so}</div>`:''}
     <h3>설명</h3><div>${n.d}</div>${relHtml}`;
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open'); resetClasses(); selected=null;}
document.getElementById('viewport').addEventListener('click',()=>closeDrawer());

document.querySelectorAll('.btn.mode').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.btn.mode').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mode=b.dataset.mode; resetClasses();
  });
});
document.getElementById('lblBtn').addEventListener('click',function(){
  labelsOn=!labelsOn; this.classList.toggle('active',labelsOn);
  EDGES.forEach(e=>{ if(!e.pathEl.classList.contains('dim')) e.lblEl.classList.toggle('show',labelsOn); });
});
let zoom=1;
function setZoom(z){zoom=Math.min(1.6,Math.max(0.4,z)); canvas.style.transform=`scale(${zoom})`; document.getElementById('zr').textContent=Math.round(zoom*100)+'%';}
document.getElementById('zi').addEventListener('click',()=>setZoom(zoom+0.1));
document.getElementById('zo').addEventListener('click',()=>setZoom(zoom-0.1));
document.getElementById('zr').addEventListener('click',()=>setZoom(1));
setZoom(Math.min(1,(window.innerWidth-20)/1720));
applyMode();
</script>
</body>
</html>
