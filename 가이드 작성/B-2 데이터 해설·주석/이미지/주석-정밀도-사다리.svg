<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="250" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">이미지 주석 정밀도 — 같은 결함, 어디까지 표시하나 (가상)</text>
  <text x="608" y="30" font-size="12" font-weight="700" fill="#2456A4">정밀도·비용 →</text>

  <!-- Panel 1 : classification tag -->
  <rect x="40" y="52" width="200" height="138" fill="#eef1f5" stroke="#c9d4e0" stroke-width="1.5"/>
  <polyline points="128,92 144,116 134,138 150,162" fill="none" stroke="#3a3f47" stroke-width="3" stroke-linejoin="round"/>
  <rect x="48" y="60" width="58" height="20" fill="#2456A4"/>
  <text x="77" y="74" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">불량</text>
  <text x="140" y="212" font-size="13" font-weight="700" fill="#10243f" text-anchor="middle">분류 태그</text>
  <text x="140" y="230" font-size="11.5" fill="#9aa6b2" text-anchor="middle">가장 쌈 · 거침</text>

  <!-- Panel 2 : bounding box -->
  <rect x="280" y="52" width="200" height="138" fill="#eef1f5" stroke="#c9d4e0" stroke-width="1.5"/>
  <polyline points="368,92 384,116 374,138 390,162" fill="none" stroke="#3a3f47" stroke-width="3" stroke-linejoin="round"/>
  <rect x="352" y="80" width="58" height="92" fill="none" stroke="#2456A4" stroke-width="2.5" stroke-dasharray="6 4"/>
  <rect x="352" y="62" width="44" height="18" fill="#2456A4"/>
  <text x="374" y="75" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">균열</text>
  <text x="380" y="212" font-size="13" font-weight="700" fill="#10243f" text-anchor="middle">박스 (Box)</text>
  <text x="380" y="230" font-size="11.5" fill="#9aa6b2" text-anchor="middle">중간 — 외관 분류에 충분</text>

  <!-- Panel 3 : mask -->
  <rect x="520" y="52" width="200" height="138" fill="#eef1f5" stroke="#c9d4e0" stroke-width="1.5"/>
  <polygon points="604,90 616,92 632,138 626,166 610,164 596,138 600,116" fill="#4FA47D" fill-opacity="0.30" stroke="#2f6b50" stroke-width="1.5"/>
  <polyline points="608,92 624,116 614,138 630,162" fill="none" stroke="#3a3f47" stroke-width="3" stroke-linejoin="round"/>
  <rect x="592" y="62" width="44" height="18" fill="#2456A4"/>
  <text x="614" y="75" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">균열</text>
  <text x="620" y="212" font-size="13" font-weight="700" fill="#10243f" text-anchor="middle">영역 (Mask)</text>
  <text x="620" y="230" font-size="11.5" fill="#9aa6b2" text-anchor="middle">가장 비쌈 · 정밀</text>

  <!-- arrows between panels -->
  <line x1="244" y1="121" x2="276" y2="121" stroke="#2456A4" stroke-width="2"/>
  <polygon points="276,121 268,117 268,125" fill="#2456A4"/>
  <line x1="484" y1="121" x2="516" y2="121" stroke="#2456A4" stroke-width="2"/>
  <polygon points="516,121 508,117 508,125" fill="#2456A4"/>
</svg>
