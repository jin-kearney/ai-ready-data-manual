<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">주석이 입혀진 결함 이미지 1장 — 세 층의 의미 (가상)</text>

  <!-- legend -->
  <g font-size="11" font-weight="700">
    <rect x="556" y="19" width="13" height="13" fill="#2456A4"/>
    <text x="574" y="30" fill="#2456A4">라벨·주석</text>
    <rect x="664" y="19" width="13" height="13" fill="#4FA47D"/>
    <text x="682" y="30" fill="#2f6b50">해설</text>
  </g>

  <!-- image panel -->
  <rect x="40" y="56" width="300" height="248" fill="#eef1f5" stroke="#c9d4e0" stroke-width="1.5"/>
  <text x="48" y="324" font-size="11" fill="#9aa6b2">외관 검사 이미지 (제품 표면)</text>

  <!-- crack (jagged line) -->
  <polyline points="150,128 168,156 156,182 178,210 166,236" fill="none" stroke="#3a3f47" stroke-width="3" stroke-linejoin="round"/>

  <!-- bounding box -->
  <rect x="120" y="112" width="86" height="150" fill="none" stroke="#2456A4" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- label tag -->
  <rect x="120" y="92" width="50" height="20" fill="#2456A4"/>
  <text x="145" y="106" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">균열</text>

  <!-- connector to callouts -->
  <line x1="206" y1="120" x2="392" y2="98" stroke="#6B9AD1" stroke-width="1.5"/>

  <!-- (1) label card -->
  <rect x="396" y="72" width="336" height="52" rx="6" fill="#2456A4"/>
  <text x="412" y="93" font-size="12.5" font-weight="700" fill="#ffffff">① 라벨 (Macro · 큰 분류)</text>
  <text x="412" y="113" font-size="12" fill="#dce8f5">결함유형 = 균열  (정해진 4종 중 선택)</text>

  <!-- (2) annotation card -->
  <rect x="396" y="134" width="336" height="74" rx="6" fill="#DCE8F5" stroke="#3F9BD4" stroke-width="1.5"/>
  <text x="412" y="156" font-size="12.5" font-weight="700" fill="#10243f">② 주석 (Micro · 세부 정보)</text>
  <text x="412" y="178" font-size="12" fill="#10243f">위치 [x412 y88 w64 h120]</text>
  <text x="412" y="197" font-size="12" fill="#10243f">심각도 6/10 · 추정원인 = 소재</text>

  <!-- (3) commentary card -->
  <rect x="396" y="218" width="336" height="78" rx="6" fill="#eaf4ee" stroke="#4FA47D" stroke-width="1.5"/>
  <text x="412" y="240" font-size="12.5" font-weight="700" fill="#2f6b50">③ 해설 (Free · 사람의 맥락)</text>
  <text x="412" y="262" font-size="12" fill="#2f6b50">"동절기 입고 ROLL-2406 계열 반복 관찰.</text>
  <text x="412" y="280" font-size="12" fill="#2f6b50"> 보관 습도 의심 — 입고검사 재확인 요망"</text>

  <!-- caption -->
  <text x="40" y="346" font-size="11.5" fill="#3a4a5e">①만으로 분류 학습 가능 · ②·③은 필요에 따라 같은 이미지 위에 쌓는다</text>
</svg>
