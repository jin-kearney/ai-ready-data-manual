<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 635" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2456A4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="700" height="635" fill="#ffffff"/>

  <!-- ① 원천 시스템 -->
  <rect x="20" y="20" width="660" height="130" rx="8" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="32" y="40" fill="#2456A4" font-size="13" font-weight="bold">① 원천 시스템 (실제 데이터는 여기 그대로)</text>
  <g fill="#79C3E8" stroke="#3F9BD4">
    <rect x="30" y="66" width="116" height="48" rx="6"/>
    <rect x="161" y="66" width="116" height="48" rx="6"/>
    <rect x="292" y="66" width="116" height="48" rx="6"/>
    <rect x="423" y="66" width="116" height="48" rx="6"/>
    <rect x="554" y="66" width="116" height="48" rx="6"/>
  </g>
  <g fill="#0b3a52" font-size="12" text-anchor="middle">
    <text x="88" y="94">ERP</text>
    <text x="219" y="94">MES</text>
    <text x="350" y="94">QMS</text>
    <text x="481" y="94">LIMS</text>
    <text x="612" y="94" font-size="11">SharePoint·파일서버</text>
  </g>

  <!-- ② 메타데이터 수집 계층 -->
  <rect x="20" y="195" width="660" height="110" rx="8" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="32" y="215" fill="#2456A4" font-size="13" font-weight="bold">② 메타데이터 수집 계층 (데이터 아님 — 위치·소재만)</text>
  <rect x="90" y="237" width="240" height="52" rx="6" fill="#3F9BD4" stroke="#2456A4"/>
  <text x="210" y="259" fill="#ffffff" font-size="12" text-anchor="middle">자동 커넥터</text>
  <text x="210" y="277" fill="#ffffff" font-size="11" text-anchor="middle">(스키마·소재 수집)</text>
  <rect x="370" y="237" width="240" height="52" rx="6" fill="#B7CDE6" stroke="#6B9AD1"/>
  <text x="490" y="259" fill="#10243f" font-size="12" text-anchor="middle">수동 등록</text>
  <text x="490" y="277" fill="#10243f" font-size="11" text-anchor="middle">(양식)</text>

  <!-- ③ 카탈로그 코어 -->
  <rect x="20" y="345" width="660" height="120" rx="8" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="32" y="365" fill="#2456A4" font-size="13" font-weight="bold">③ 카탈로그 코어 — 메타데이터만 보관</text>
  <rect x="40" y="385" width="150" height="40" rx="6" fill="#B7CDE6" stroke="#6B9AD1"/>
  <text x="115" y="409" fill="#10243f" font-size="12" text-anchor="middle">검색 인덱스</text>
  <ellipse cx="350" cy="405" rx="120" ry="34" fill="#2456A4" stroke="#163a73" stroke-width="2"/>
  <text x="350" y="401" fill="#ffffff" font-size="12.5" font-weight="bold" text-anchor="middle">데이터 카탈로그</text>
  <text x="350" y="419" fill="#cdddf3" font-size="11" text-anchor="middle">(메타데이터·소재)</text>
  <rect x="510" y="385" width="150" height="40" rx="6" fill="#3F9BD4" stroke="#2456A4"/>
  <text x="585" y="409" fill="#ffffff" font-size="12" text-anchor="middle">권한 연동</text>

  <!-- ④ 소비 계층 -->
  <rect x="20" y="505" width="660" height="110" rx="8" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="32" y="525" fill="#2456A4" font-size="13" font-weight="bold">④ 소비 계층</text>
  <rect x="90" y="545" width="240" height="52" rx="6" fill="#4FA47D" stroke="#2f6b50"/>
  <text x="210" y="567" fill="#ffffff" font-size="12" text-anchor="middle">탐색 UI</text>
  <text x="210" y="585" fill="#eaf4ee" font-size="11" text-anchor="middle">(현업 검색)</text>
  <rect x="370" y="545" width="240" height="52" rx="6" fill="#4FA47D" stroke="#2f6b50"/>
  <text x="490" y="567" fill="#ffffff" font-size="12" text-anchor="middle">검색 API</text>
  <text x="490" y="585" fill="#eaf4ee" font-size="11" text-anchor="middle">(RAG·Agent)</text>

  <!-- 화살표 -->
  <g stroke="#2456A4" stroke-width="1.8" fill="none">
    <line x1="210" y1="150" x2="210" y2="233" marker-end="url(#arr)"/>
    <line x1="490" y1="150" x2="490" y2="233" marker-end="url(#arr)" stroke-dasharray="5 4"/>
    <line x1="210" y1="289" x2="300" y2="375" marker-end="url(#arr)"/>
    <line x1="490" y1="289" x2="400" y2="375" marker-end="url(#arr)"/>
    <line x1="228" y1="405" x2="194" y2="405" marker-end="url(#arr)"/>
    <line x1="472" y1="405" x2="506" y2="405" marker-end="url(#arr)"/>
    <line x1="320" y1="437" x2="220" y2="541" marker-end="url(#arr)"/>
    <line x1="380" y1="437" x2="480" y2="541" marker-end="url(#arr)"/>
  </g>
  <text x="500" y="185" fill="#5a6b80" font-size="11">수동/템플릿</text>
</svg>
