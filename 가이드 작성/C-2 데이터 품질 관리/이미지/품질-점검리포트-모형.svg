  <text x="36" y="435" font-size="12.5" fill="#10243f"><tspan font-weight="700" fill="#b32020">종합 판정 — 미달(차단):</tspan> 최신성 규칙 미통과 → AI 투입 자동 차단. 꼭 써야 하면 예외 승인(승인자·사유·기간·범위 기록) 후 한시 사용.</text>
