<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="340" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">Prompt Registry — 버전 이력·상태·롤백 (예시)</text>
  <text x="24" y="50" font-size="12" fill="#6b7785">claim-classification  ·  CCL 클레임 원인 분류</text>

  <!-- 표 머리글 -->
  <g font-size="12" text-anchor="middle">
    <rect x="40" y="64" width="80" height="30" fill="#DCE8F5" stroke="#6B9AD1"/>
    <rect x="120" y="64" width="300" height="30" fill="#DCE8F5" stroke="#6B9AD1"/>
    <rect x="420" y="64" width="110" height="30" fill="#DCE8F5" stroke="#6B9AD1"/>
    <rect x="530" y="64" width="90" height="30" fill="#DCE8F5" stroke="#6B9AD1"/>
    <text x="80" y="84" font-weight="700" fill="#10243f">버전</text>
    <text x="270" y="84" font-weight="700" fill="#10243f">변경 사유</text>
    <text x="475" y="84" font-weight="700" fill="#10243f">상태</text>
    <text x="575" y="84" font-weight="700" fill="#10243f">평가 정확도</text>
  </g>

  <!-- v2.2.0 (배포) -->
  <g font-size="12">
    <rect x="40" y="94" width="80" height="40" fill="#f1f8f4" stroke="#c9d4e0"/>
    <rect x="120" y="94" width="300" height="40" fill="#f1f8f4" stroke="#c9d4e0"/>
    <rect x="420" y="94" width="110" height="40" fill="#f1f8f4" stroke="#c9d4e0"/>
    <rect x="530" y="94" width="90" height="40" fill="#f1f8f4" stroke="#c9d4e0"/>
    <text x="80" y="119" text-anchor="middle" font-weight="700" fill="#10243f">v2.2.0</text>
    <text x="134" y="119" fill="#10243f">Glossary v3.3 용어 변경 반영</text>
    <rect x="445" y="103" width="60" height="22" rx="11" fill="#4FA47D"/>
    <text x="475" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">배포</text>
    <text x="575" y="119" text-anchor="middle" font-weight="700" fill="#2f6b50">91%</text>
  </g>

  <!-- v2.1.0 (폐기) -->
  <g font-size="12">
    <rect x="40" y="134" width="80" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="120" y="134" width="300" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="420" y="134" width="110" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="530" y="134" width="90" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <text x="80" y="159" text-anchor="middle" font-weight="700" fill="#10243f">v2.1.0</text>
    <text x="134" y="159" fill="#10243f">Delamination 소재/공정 구분 추가</text>
    <rect x="445" y="143" width="60" height="22" rx="11" fill="#e7ecf2" stroke="#b8c4d2"/>
    <text x="475" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7785">폐기</text>
    <text x="575" y="159" text-anchor="middle" fill="#6b7785">88%</text>
  </g>

  <!-- v2.0.1 (폐기) -->
  <g font-size="12">
    <rect x="40" y="174" width="80" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="120" y="174" width="300" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="420" y="174" width="110" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <rect x="530" y="174" width="90" height="40" fill="#ffffff" stroke="#c9d4e0"/>
    <text x="80" y="199" text-anchor="middle" font-weight="700" fill="#10243f">v2.0.1</text>
    <text x="134" y="199" fill="#10243f">출력 문구 오탈자 수정 (Patch)</text>
    <rect x="445" y="183" width="60" height="22" rx="11" fill="#e7ecf2" stroke="#b8c4d2"/>
    <text x="475" y="198" text-anchor="middle" font-size="11" font-weight="700" fill="#6b7785">폐기</text>
    <text x="575" y="199" text-anchor="middle" fill="#6b7785">87%</text>
  </g>

  <!-- 롤백 화살표: v2.2.0 → v2.1.0 -->
  <path d="M 632 114 C 690 114, 690 154, 634 154" fill="none" stroke="#C9663A" stroke-width="1.6"/>
  <polygon points="640,148 630,156 642,161" fill="#C9663A"/>
  <text x="700" y="132" font-size="11" font-weight="700" fill="#C9663A">문제 시</text>
  <text x="700" y="148" font-size="11" font-weight="700" fill="#C9663A">롤백</text>

  <!-- 주석 -->
  <g font-size="11.5">
    <line x1="80" y1="214" x2="80" y2="250" stroke="#2456A4" stroke-width="1.2"/>
    <text x="44" y="268" fill="#2456A4" font-weight="700">① 배포된 버전은 고치지 않는다</text>
    <text x="44" y="285" fill="#3a4a55">수정이 필요하면 항상 새 버전 — 운영 로그가 버전에 고정돼 추적이 정확하다</text>
    <text x="44" y="309" fill="#2456A4" font-weight="700">② 변경 사유·평가 점수·롤백 대상을 함께 남긴다</text>
    <text x="44" y="326" fill="#3a4a55">새 버전이 나빠지면 직전 배포 버전(v2.1.0)으로 즉시 되돌릴 수 있다</text>
  </g>
</svg>
