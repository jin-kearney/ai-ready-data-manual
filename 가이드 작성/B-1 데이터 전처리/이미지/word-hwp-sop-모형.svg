<svg viewBox="0 0 760 350" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="350" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">Word·HWP 작업표준서(SOP) — 전처리 전 모습 (가상)</text>

  <!-- legend : 파란=현상, 녹색=가이드 -->
  <g font-size="11" font-weight="700">
    <line x1="486" y1="26" x2="508" y2="26" stroke="#2456A4" stroke-width="3"/>
    <text x="514" y="30" fill="#2456A4">현상(문서 특징)</text>
    <line x1="624" y1="26" x2="646" y2="26" stroke="#4FA47D" stroke-width="3"/>
    <text x="652" y="30" fill="#2f6b50">가이드(전처리)</text>
  </g>

  <!-- document page -->
  <rect x="40" y="50" width="400" height="282" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.5"/>

  <!-- headings: visually styled, with faint style tags -->
  <text x="62" y="86" font-size="16" font-weight="700" fill="#10243f">용접 작업표준</text>
  <text x="430" y="86" font-size="9" fill="#b0bcc8" text-anchor="end">[제목1]</text>

  <text x="62" y="118" font-size="13.5" font-weight="700" fill="#1f3a63">2. 본작업</text>
  <text x="430" y="118" font-size="9" fill="#b0bcc8" text-anchor="end">[제목2]</text>

  <text x="62" y="146" font-size="12.5" font-weight="700" fill="#2456A4">2.1 예열</text>
  <text x="430" y="146" font-size="9" fill="#b0bcc8" text-anchor="end">[제목3]</text>

  <!-- numbered procedure -->
  <g font-size="11.5" fill="#10243f">
    <text x="74" y="170">1. 예열 토치로 150℃까지 가열</text>
    <text x="74" y="190">2. 온도계로 확인</text>
    <text x="74" y="210">3. 기록지에 기입</text>
  </g>

  <!-- caution table -->
  <g font-size="11" fill="#10243f" text-anchor="middle">
    <rect x="62" y="226" width="240" height="44" fill="#fff" stroke="#6B9AD1"/>
    <rect x="62" y="226" width="240" height="18" fill="#DCE8F5" stroke="#6B9AD1"/>
    <line x1="170" y1="226" x2="170" y2="270" stroke="#6B9AD1"/>
    <line x1="62" y1="244" x2="302" y2="244" stroke="#6B9AD1"/>
    <text x="116" y="239" font-weight="700">항목</text><text x="236" y="239" font-weight="700">기준</text>
    <text x="116" y="261">예열온도</text><text x="236" y="261">150±10℃</text>
  </g>
  <text x="62" y="292" font-size="10.5" fill="#9aa6b2">[주의] 표</text>

  <!-- annotations : 파란=현상, 녹색=가이드 -->
  <g font-size="12">
    <line x1="350" y1="86" x2="466" y2="82" stroke="#2456A4" stroke-width="1.2"/>
    <text x="474" y="78" fill="#2456A4" font-weight="700">제목이 큰 글씨가 아니라 스타일로만 구분 — 추출 시 평평해짐</text>
    <text x="474" y="95" fill="#2f6b50">→ 스타일을 제목 계층(#·##)으로 복원</text>

    <line x1="240" y1="180" x2="466" y2="158" stroke="#2456A4" stroke-width="1.2"/>
    <text x="474" y="160" fill="#2456A4" font-weight="700">작업 절차가 번호 문단으로 나열</text>
    <text x="474" y="177" fill="#2f6b50">→ 단계 리스트로 보존</text>

    <line x1="302" y1="248" x2="466" y2="216" stroke="#2456A4" stroke-width="1.2"/>
    <text x="474" y="218" fill="#2456A4" font-weight="700">주의 표</text>
    <text x="474" y="235" fill="#2f6b50">→ 행·열로 복원</text>

    <text x="474" y="270" fill="#2456A4" font-weight="700">HWP는 파서가 빈약</text>
    <text x="474" y="287" fill="#2f6b50">→ 텍스트·XML 추출 또는 PDF 변환 경유</text>
  </g>
</svg>
