<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">스캔 검사 일지 — 전처리 전 모습 (가상)</text>

  <!-- legend : 파란=현상, 녹색=가이드 -->
  <g font-size="11" font-weight="700">
    <line x1="486" y1="26" x2="508" y2="26" stroke="#2456A4" stroke-width="3"/>
    <text x="514" y="30" fill="#2456A4">현상(문서 특징)</text>
    <line x1="624" y1="26" x2="646" y2="26" stroke="#4FA47D" stroke-width="3"/>
    <text x="652" y="30" fill="#2f6b50">가이드(전처리)</text>
  </g>

  <!-- scanned paper, slightly skewed -->
  <g transform="rotate(-1.3 250 215)">
    <rect x="44" y="56" width="412" height="210" fill="#fcfbf7" stroke="#d8d2c4" stroke-width="1.5"/>
    <rect x="44" y="56" width="412" height="210" fill="none" stroke="#efe9da"/>
    <!-- scan noise line -->
    <line x1="44" y1="150" x2="456" y2="150" stroke="#f0ece1" stroke-width="6"/>

    <text x="250" y="92" font-size="14" font-weight="700" fill="#2b2b2b" text-anchor="middle">설비 점검 일지 (PRESS-07)</text>
    <text x="66" y="118" font-size="11.5" fill="#3a3a3a">점검일: 2026-06-15      점검자:</text>
    <text x="232" y="120" font-size="14" fill="#1b3a8c" font-style="italic" font-family="'Comic Sans MS', cursive">김O수</text>

    <!-- table -->
    <g font-size="11.5" fill="#2b2b2b">
      <line x1="66" y1="134" x2="434" y2="134" stroke="#b9b2a2"/>
      <rect x="66" y="138" width="368" height="28" fill="#f3efe4" stroke="#b9b2a2"/>
      <text x="92" y="156">항목</text><text x="232" y="156">측정</text><text x="372" y="156">판정</text>
      <line x1="206" y1="138" x2="206" y2="222" stroke="#b9b2a2"/>
      <line x1="330" y1="138" x2="330" y2="222" stroke="#b9b2a2"/>
      <rect x="66" y="166" width="368" height="56" fill="none" stroke="#b9b2a2"/>
      <line x1="66" y1="194" x2="434" y2="194" stroke="#cfc8b8"/>

      <text x="80" y="185">유압</text>
      <text x="216" y="186" fill="#1b3a8c" font-style="italic" font-family="'Comic Sans MS', cursive" font-size="14">12.4 MPa</text>
      <text x="350" y="185">양호</text>

      <text x="80" y="213">윤활유량</text>
      <text x="232" y="214" text-anchor="middle" fill="#6b6b6b" font-style="italic" font-family="'Comic Sans MS', cursive" font-size="13" filter="url(#blur)" opacity="0.55">(흐림)</text>
      <text x="350" y="213" fill="#bdb6a6">____</text>
    </g>
  </g>

  <!-- annotations : 파란=현상, 녹색=가이드 -->
  <g font-size="12">
    <line x1="300" y1="120" x2="500" y2="90" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="92" fill="#2456A4" font-weight="700">인쇄된 항목명 — 인식 쉬움</text>
    <text x="506" y="109" fill="#2f6b50">→ 그대로 텍스트화</text>

    <line x1="300" y1="186" x2="500" y2="164" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="166" fill="#2456A4" font-weight="700">손글씨 측정값 — 인식 신뢰도 들쭉날쭉</text>
    <text x="506" y="183" fill="#2f6b50">→ 신뢰도 낮으면 검수 대상으로 분류</text>

    <line x1="300" y1="214" x2="500" y2="230" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="232" fill="#2456A4" font-weight="700">흐려서 판독 불가</text>
    <text x="506" y="249" fill="#2f6b50">→ 지어내지 말고 [?]로 두고 사람 검수로</text>
  </g>

</svg>
