<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <defs>
    <filter id="blur"><feGaussianBlur stdDeviation="1.6"/></filter>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">스캔 검사 일지 — 전처리 전 모습 (가상)</text>

  <!-- scanned paper, slightly skewed -->
  <g transform="rotate(-1.3 250 215)">
    <rect x="44" y="56" width="412" height="316" fill="#fcfbf7" stroke="#d8d2c4" stroke-width="1.5"/>
    <rect x="44" y="56" width="412" height="316" fill="none" stroke="#efe9da"/>
    <!-- scan noise lines -->
    <line x1="44" y1="150" x2="456" y2="150" stroke="#f0ece1" stroke-width="6"/>
    <line x1="44" y1="300" x2="456" y2="300" stroke="#f3efe6" stroke-width="8"/>

    <text x="250" y="92" font-size="14" font-weight="700" fill="#2b2b2b" text-anchor="middle">설비 점검 일지 (PRESS-07)</text>
    <text x="66" y="118" font-size="11.5" fill="#3a3a3a">점검일: 2026-06-15      점검자:</text>
    <text x="232" y="120" font-size="14" fill="#1b3a8c" font-style="italic" font-family="'Comic Sans MS', cursive">김O수</text>

    <!-- table -->
    <g font-size="11.5" fill="#2b2b2b">
      <line x1="66" y1="134" x2="434" y2="134" stroke="#b9b2a2"/>
      <rect x="66" y="138" width="368" height="28" fill="#f3efe4" stroke="#b9b2a2"/>
      <text x="92" y="156">항목</text><text x="232" y="156">측정</text><text x="372" y="156">판정</text>
      <line x1="206" y1="138" x2="206" y2="250" stroke="#b9b2a2"/>
      <line x1="330" y1="138" x2="330" y2="250" stroke="#b9b2a2"/>
      <rect x="66" y="166" width="368" height="84" fill="none" stroke="#b9b2a2"/>
      <line x1="66" y1="194" x2="434" y2="194" stroke="#cfc8b8"/>
      <line x1="66" y1="222" x2="434" y2="222" stroke="#cfc8b8"/>

      <text x="80" y="185">유압</text>
      <text x="216" y="186" fill="#1b3a8c" font-style="italic" font-family="'Comic Sans MS', cursive" font-size="14">12.4 MPa</text>
      <text x="350" y="185">양호</text>

      <text x="80" y="213">윤활유량</text>
      <text x="216" y="214" fill="#6b6b6b" font-style="italic" font-family="'Comic Sans MS', cursive" font-size="14" filter="url(#blur)" opacity="0.6">8.?</text>
      <text x="350" y="213" fill="#bdb6a6">____</text>

      <text x="80" y="241">벨트 장력</text>
      <text x="216" y="242" fill="#1b3a8c" font-style="italic" font-family="'Comic Sans MS', cursive" font-size="14">정상</text>
      <text x="350" y="241">양호</text>
    </g>
  </g>

  <!-- annotations -->
  <g font-size="12">
    <line x1="300" y1="120" x2="500" y2="96" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="92" fill="#2456A4" font-weight="700">인쇄 항목명</text>
    <text x="506" y="108" fill="#3a4a55">OCR 인식 쉬움</text>

    <line x1="300" y1="186" x2="500" y2="170" stroke="#4FA47D" stroke-width="1.3"/>
    <text x="506" y="166" fill="#2f6b50" font-weight="700">손글씨 측정값</text>
    <text x="506" y="182" fill="#3a4a55">신뢰도 낮으면 검수 플래그(_review)</text>

    <line x1="300" y1="214" x2="500" y2="232" stroke="#d64545" stroke-width="1.3"/>
    <text x="506" y="232" fill="#b32020" font-weight="700">흐려서 판독 불가</text>
    <text x="506" y="248" fill="#3a4a55">지어내지 말고 [?]로 두고 사람에게</text>
  </g>

  <text x="24" y="318" font-size="12.5" fill="#3a4a55">스캔 이미지는 글자가 픽셀뿐이라 OCR이 필수다. 인쇄 글자는 잘 읽히지만 손글씨·흐림은</text>
  <text x="24" y="340" font-size="12.5" fill="#3a4a55">정확도가 낮다. 셀별 신뢰도를 받아 낮은 셀만 사람 검수로 분리해 틀린 값이 들어가지 않게 한다.</text>
</svg>
