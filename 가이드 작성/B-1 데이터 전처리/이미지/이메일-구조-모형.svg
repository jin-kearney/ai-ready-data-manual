<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">이메일(Outlook) 한 통의 구조 — 전처리 전 (가상)</text>

  <!-- legend : 파란=현상, 녹색=가이드 -->
  <g font-size="11" font-weight="700">
    <line x1="486" y1="26" x2="508" y2="26" stroke="#2456A4" stroke-width="3"/>
    <text x="514" y="30" fill="#2456A4">현상(문서 특징)</text>
    <line x1="624" y1="26" x2="646" y2="26" stroke="#4FA47D" stroke-width="3"/>
    <text x="652" y="30" fill="#2f6b50">가이드(전처리)</text>
  </g>

  <!-- mail window -->
  <rect x="34" y="46" width="430" height="310" rx="6" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.5"/>

  <!-- header panel -->
  <rect x="34" y="46" width="430" height="86" rx="6" fill="#f3f7fc" stroke="#c9d4e0"/>
  <g font-size="11.5">
    <text x="50" y="68" fill="#6b7785">보낸사람</text><text x="120" y="68" fill="#10243f">협력사 김** &lt;kim@supplier.com&gt;</text>
    <text x="50" y="86" fill="#6b7785">받는사람</text><text x="120" y="86" fill="#10243f">품질팀 · 2026-06-16</text>
    <text x="50" y="104" fill="#6b7785">제목</text><text x="120" y="104" fill="#10243f" font-weight="700">RE: [긴급] 로트 L-2026-0312 표면 결함 건</text>
    <text x="50" y="122" fill="#9aa6b2" font-size="10.5">Message-ID &lt;a1@supplier.com&gt; · In-Reply-To &lt;b2@doosan.com&gt;</text>
  </g>

  <!-- body -->
  <text x="50" y="156" font-size="12" fill="#10243f">3차 측정 결과 회신드립니다. 재현됨 확인했습니다.</text>

  <!-- embedded table : 1 data row matching body example -->
  <g font-size="10.5" fill="#10243f" text-anchor="middle">
    <rect x="50" y="166" width="180" height="32" fill="#fff" stroke="#6B9AD1"/>
    <rect x="50" y="166" width="180" height="16" fill="#DCE8F5" stroke="#6B9AD1"/>
    <line x1="120" y1="166" x2="120" y2="198" stroke="#6B9AD1"/>
    <line x1="180" y1="166" x2="180" y2="198" stroke="#6B9AD1"/>
    <line x1="50" y1="182" x2="230" y2="182" stroke="#6B9AD1"/>
    <text x="85" y="178" font-weight="700">위치</text><text x="150" y="178" font-weight="700">실측</text><text x="205" y="178" font-weight="700">판정</text>
    <text x="85" y="194">모서리</text><text x="150" y="194">0.08</text><text x="205" y="194" fill="#b32020" font-weight="700">NG</text>
  </g>
  <!-- inline image -->
  <rect x="244" y="166" width="120" height="48" fill="#eef2f7" stroke="#9aa6b2" stroke-dasharray="4 3"/>
  <text x="304" y="188" font-size="10.5" fill="#6b7785" text-anchor="middle">추세 그래프</text>
  <text x="304" y="203" font-size="9.5" fill="#9aa6b2" text-anchor="middle">(내장 이미지 cid:graph1)</text>

  <!-- signature / disclaimer -->
  <line x1="50" y1="232" x2="250" y2="232" stroke="#d7e0ea"/>
  <text x="50" y="248" font-size="10.5" fill="#9aa6b2">-- ㈜OO 품질팀 | 본 메일은 수신자 외 …(면책)</text>

  <!-- quoted thread -->
  <rect x="50" y="262" width="398" height="40" fill="#f7f8fa" stroke="#e2e7ee"/>
  <line x1="56" y1="262" x2="56" y2="302" stroke="#c9d4e0" stroke-width="3"/>
  <text x="66" y="280" font-size="10.5" fill="#9aa6b2">&gt; 2026-06-15 품질팀 wrote:</text>
  <text x="66" y="295" font-size="10.5" fill="#9aa6b2">&gt; 측정 부탁드립니다 …(인용된 과거 메일)</text>

  <!-- attachment chip -->
  <rect x="50" y="316" width="220" height="26" rx="4" fill="#eef6f1" stroke="#7CC2A7"/>
  <text x="62" y="333" font-size="11" fill="#2f6b50">첨부  L-2026-0312_3차측정.pdf</text>

  <!-- annotations : 파란=현상, 녹색=가이드 -->
  <g font-size="11.5">
    <line x1="464" y1="88" x2="500" y2="76" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="78" fill="#2456A4" font-weight="700">헤더에 보낸이·날짜·대화ID</text>
    <text x="506" y="93" fill="#2f6b50">→ 메타데이터로 분리해 스레드 묶기</text>

    <line x1="230" y1="190" x2="500" y2="138" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="140" fill="#2456A4" font-weight="700">본문에 표가 박혀 있음</text>
    <text x="506" y="155" fill="#2f6b50">→ 버리지 말고 Markdown 표로 유지</text>

    <line x1="364" y1="190" x2="500" y2="188" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="190" fill="#2456A4" font-weight="700">내장 이미지(그래프)</text>
    <text x="506" y="205" fill="#2f6b50">→ 이미지·스캔본 경로(OCR)로 보냄</text>

    <line x1="250" y1="248" x2="500" y2="248" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="248" fill="#2456A4" font-weight="700">서명·면책·인용이 본문에 섞임</text>
    <text x="506" y="263" fill="#2f6b50">→ 스레드 중복·잡음으로 제거</text>

    <line x1="270" y1="329" x2="500" y2="318" stroke="#2456A4" stroke-width="1.2"/>
    <text x="506" y="320" fill="#2456A4" font-weight="700">첨부파일(PDF 등)</text>
    <text x="506" y="335" fill="#2f6b50">→ 각 유형 경로로, 본문과 ID로 연결</text>
  </g>

</svg>
