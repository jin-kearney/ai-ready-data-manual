<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">PPT 기술자료 — 전처리 전 모습 (가상)</text>

  <!-- legend : 파란=현상, 녹색=가이드 -->
  <g font-size="11" font-weight="700">
    <line x1="486" y1="26" x2="508" y2="26" stroke="#2456A4" stroke-width="3"/>
    <text x="514" y="30" fill="#2456A4">현상(문서 특징)</text>
    <line x1="624" y1="26" x2="646" y2="26" stroke="#4FA47D" stroke-width="3"/>
    <text x="652" y="30" fill="#2f6b50">가이드(전처리)</text>
  </g>

  <!-- slide canvas -->
  <rect x="40" y="50" width="410" height="212" rx="4" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.5"/>
  <text x="436" y="256" font-size="10" fill="#9aa6b2" text-anchor="end">슬라이드 7</text>

  <!-- title textbox (made 3rd) -->
  <rect x="54" y="60" width="300" height="26" fill="none" stroke="#9aa6b2" stroke-dasharray="4 3"/>
  <text x="62" y="78" font-size="13" font-weight="700" fill="#10243f">터빈 블레이드 용접 결함 유형</text>
  <circle cx="346" cy="73" r="9" fill="#DCE8F5" stroke="#2456A4"/><text x="346" y="77" font-size="10" fill="#2456A4" text-anchor="middle">3</text>

  <!-- bullet textbox (made 1st) -->
  <rect x="54" y="96" width="230" height="96" fill="none" stroke="#9aa6b2" stroke-dasharray="4 3"/>
  <g font-size="12" fill="#10243f">
    <text x="64" y="118">• 크랙 — 표면 균열</text>
    <text x="64" y="142">• 기공 — 내부 공동</text>
    <text x="64" y="166">• 언더컷 — 모재 패임</text>
  </g>
  <circle cx="276" cy="105" r="9" fill="#DCE8F5" stroke="#2456A4"/><text x="276" y="109" font-size="10" fill="#2456A4" text-anchor="middle">1</text>

  <!-- table (made 2nd) -->
  <g font-size="10" fill="#10243f" text-anchor="middle">
    <rect x="298" y="96" width="142" height="60" fill="#fff" stroke="#6B9AD1"/>
    <rect x="298" y="96" width="142" height="18" fill="#DCE8F5" stroke="#6B9AD1"/>
    <line x1="346" y1="96" x2="346" y2="156" stroke="#6B9AD1"/>
    <line x1="394" y1="96" x2="394" y2="156" stroke="#6B9AD1"/>
    <line x1="298" y1="114" x2="440" y2="114" stroke="#6B9AD1"/>
    <line x1="298" y1="135" x2="440" y2="135" stroke="#d7e0ea"/>
    <text x="322" y="109" font-weight="700">결함</text><text x="370" y="109" font-weight="700">허용</text><text x="417" y="109" font-weight="700">검출법</text>
    <text x="322" y="128">크랙</text><text x="370" y="128">불허</text><text x="417" y="128">PT</text>
    <text x="322" y="149">기공</text><text x="370" y="149">Ø0.5↓</text><text x="417" y="149">RT</text>
  </g>
  <circle cx="432" cy="105" r="9" fill="#DCE8F5" stroke="#2456A4"/><text x="432" y="109" font-size="10" fill="#2456A4" text-anchor="middle">2</text>

  <!-- notes strip (made 4th) -->
  <rect x="54" y="206" width="386" height="42" fill="#f3f7fc" stroke="#c9d4e0"/>
  <text x="64" y="224" font-size="11" fill="#6b7785">발표자 노트</text>
  <text x="64" y="240" font-size="11" fill="#10243f">고온부는 PT 우선</text>
  <circle cx="430" cy="216" r="9" fill="#eef6f1" stroke="#2f6b50"/><text x="430" y="220" font-size="10" fill="#2f6b50" text-anchor="middle">4</text>

  <!-- annotations : 파란=현상, 녹색=가이드 -->
  <g font-size="12">
    <line x1="354" y1="73" x2="470" y2="70" stroke="#2456A4" stroke-width="1.2"/>
    <text x="478" y="66" fill="#2456A4" font-weight="700">텍스트박스가 만든 순서(①②③)로 저장 — 화면 위치와 다름</text>
    <text x="478" y="83" fill="#2f6b50">→ 좌표로 위→아래 재정렬</text>

    <line x1="440" y1="126" x2="470" y2="126" stroke="#2456A4" stroke-width="1.2"/>
    <text x="478" y="122" fill="#2456A4" font-weight="700">표·차트는 글자가 아니라 안에 든 수치 데이터</text>
    <text x="478" y="139" fill="#2f6b50">→ 값을 표로 추출</text>

    <line x1="440" y1="224" x2="470" y2="200" stroke="#2456A4" stroke-width="1.2"/>
    <text x="478" y="186" fill="#2456A4" font-weight="700">발표자 노트에도 정보가 있음</text>
    <text x="478" y="203" fill="#2f6b50">→ 함께 추출</text>

    <text x="478" y="236" fill="#2f6b50" font-weight="700">→ 슬라이드 1장 = 1청크로 묶고 제목·번호 부착</text>
  </g>
</svg>
