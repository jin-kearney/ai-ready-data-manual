<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="13">
  <rect x="0" y="0" width="1040" height="380" fill="#ffffff"/>
  <text x="20" y="30" font-size="15" font-weight="bold" fill="#10243f">피드백 한 건이 도는 여정 — 설비 정비 챗봇 "가스터빈 베어링 교체 주기" 반복 오답 (가상 예시)</text>

  <!-- legend -->
  <rect x="780" y="14" width="14" height="14" rx="2" fill="#79C3E8" stroke="#3F9BD4"/>
  <text x="800" y="26" fill="#0b3a52">증상·수집</text>
  <rect x="884" y="14" width="14" height="14" rx="2" fill="#B7CDE6" stroke="#6B9AD1"/>
  <text x="904" y="26" fill="#10243f">분류·라우팅</text>
  <rect x="780" y="34" width="14" height="14" rx="2" fill="#4FA47D"/>
  <text x="800" y="46" fill="#1f4d3a">개선·재검증</text>

  <!-- Step 1: 증상 -->
  <rect x="20" y="70" width="180" height="150" rx="8" fill="#EAF4FB" stroke="#3F9BD4" stroke-width="1.5"/>
  <text x="30" y="92" font-weight="bold" fill="#0b3a52">① 증상 (사용자 화면)</text>
  <text x="30" y="116" fill="#10243f">정비팀 질문:</text>
  <text x="30" y="134" fill="#10243f">"1호기 베어링 교체 주기"</text>
  <text x="30" y="158" fill="#b03030">AI 답: "정보를 찾을</text>
  <text x="30" y="176" fill="#b03030">수 없습니다"</text>
  <text x="30" y="200" fill="#0b3a52">→ 싫어요 클릭·재질문</text>

  <!-- Step 2: 수집 -->
  <rect x="232" y="70" width="180" height="150" rx="8" fill="#EAF4FB" stroke="#3F9BD4" stroke-width="1.5"/>
  <text x="242" y="92" font-weight="bold" fill="#0b3a52">② 수집 (피드백 1건)</text>
  <text x="242" y="116" fill="#10243f">trace_id: tr-9f2a</text>
  <text x="242" y="134" fill="#10243f">과제: 정비 챗봇</text>
  <text x="242" y="152" fill="#10243f">평가: 싫어요</text>
  <text x="242" y="170" fill="#10243f">근거(citation): 없음</text>
  <text x="242" y="194" fill="#6b7a90" font-size="12">자동 로그로 적재</text>

  <!-- Step 3: 분류 -->
  <rect x="444" y="70" width="180" height="150" rx="8" fill="#DCE8F5" stroke="#2456A4" stroke-width="1.5"/>
  <text x="454" y="92" font-weight="bold" fill="#10243f">③ 분류 (원인 태깅)</text>
  <text x="454" y="118" fill="#10243f">집계: 같은 유형</text>
  <text x="454" y="136" fill="#10243f">실패율 68%</text>
  <rect x="454" y="150" width="150" height="26" rx="4" fill="#2456A4"/>
  <text x="464" y="168" fill="#ffffff" font-weight="bold">태그: DATA_GAP</text>
  <text x="454" y="200" fill="#6b7a90" font-size="12">근거 문서 미등록</text>

  <!-- Step 4: 라우팅 -->
  <rect x="656" y="70" width="180" height="150" rx="8" fill="#DCE8F5" stroke="#2456A4" stroke-width="1.5"/>
  <text x="666" y="92" font-weight="bold" fill="#10243f">④ 라우팅 (원인 주제)</text>
  <rect x="666" y="108" width="150" height="26" rx="4" fill="#B7CDE6" stroke="#6B9AD1"/>
  <text x="676" y="126" fill="#10243f" font-weight="bold">→ A-1 카탈로그</text>
  <text x="666" y="156" fill="#10243f">개선 과제:</text>
  <text x="666" y="174" fill="#10243f">"정비 매뉴얼 5종</text>
  <text x="666" y="192" fill="#10243f">등록" Backlog</text>

  <!-- Step 5: 재검증 -->
  <rect x="868" y="70" width="152" height="150" rx="8" fill="#E4F3EC" stroke="#4FA47D" stroke-width="1.5"/>
  <text x="878" y="92" font-weight="bold" fill="#1f4d3a">⑤ 재검증</text>
  <text x="878" y="118" fill="#1f4d3a">다음 주기</text>
  <text x="878" y="142" fill="#1f4d3a">같은 질문</text>
  <text x="878" y="170" font-size="18" font-weight="bold" fill="#2f6b50">68% → 12%</text>
  <text x="878" y="196" fill="#6b7a90" font-size="12">실패율 감소 확인</text>

  <!-- arrows -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2456A4"/>
    </marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4FA47D"/>
    </marker>
  </defs>
  <line x1="200" y1="145" x2="230" y2="145" stroke="#2456A4" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="412" y1="145" x2="442" y2="145" stroke="#2456A4" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="624" y1="145" x2="654" y2="145" stroke="#2456A4" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="836" y1="145" x2="866" y2="145" stroke="#2456A4" stroke-width="2" marker-end="url(#ah)"/>

  <!-- loop back -->
  <path d="M944,220 L944,300 L120,300 L120,222" fill="none" stroke="#4FA47D" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ahg)"/>
  <text x="430" y="294" fill="#2f6b50">고치면 같은 증상이 줄어든다 — 닫힌 고리(데이터 플라이휠)</text>

  <text x="20" y="350" fill="#6b7a90" font-size="12">E-4는 증상을 모아 원인 주제(여기선 A-1)로 되돌리는 허브다. 실제 고치는 일은 라우팅된 그 주제에서 한다.</text>
</svg>
