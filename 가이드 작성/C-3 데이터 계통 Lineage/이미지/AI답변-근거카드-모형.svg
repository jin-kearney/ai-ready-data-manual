<svg viewBox="0 0 780 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="780" height="340" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">AI 답변에 근거(Citation)를 함께 남긴다 (가상 예시)</text>

  <!-- ===== answer card ===== -->
  <rect x="36" y="56" width="430" height="248" rx="10" fill="#ffffff" stroke="#6B9AD1" stroke-width="1.5"/>
  <rect x="36" y="56" width="430" height="34" rx="10" fill="#2456A4"/>
  <rect x="36" y="74" width="430" height="16" fill="#2456A4"/>
  <text x="56" y="79" font-size="13" font-weight="700" fill="#ffffff">AI 설비 점검 답변</text>

  <!-- answer body -->
  <g font-size="12.5" fill="#10243f">
    <text x="56" y="120">1호기 베어링에서 이상 진동이 감지됩니다.</text>
    <text x="56" y="142">권장 조치: 윤활 상태를 점검한 뒤 재측정하십시오.</text>
  </g>

  <line x1="56" y1="162" x2="446" y2="162" stroke="#eef1f5"/>
  <text x="56" y="184" font-size="11.5" font-weight="700" fill="#6b7785">근거</text>

  <!-- citation chips -->
  <g font-size="11">
    <rect x="56" y="196" width="200" height="26" rx="13" fill="#DCE8F5" stroke="#3F9BD4"/>
    <text x="70" y="213" fill="#0b3a52">진동 센서 로그 · 2026-06-14</text>

    <rect x="56" y="230" width="220" height="26" rx="13" fill="#DCE8F5" stroke="#3F9BD4"/>
    <text x="70" y="247" fill="#0b3a52">정비 기준서 SOP-074 · p.5</text>

    <rect x="56" y="264" width="210" height="26" rx="13" fill="#DCE8F5" stroke="#3F9BD4"/>
    <text x="70" y="281" fill="#0b3a52">유사 사례 이력 · INC-2025-0312</text>
  </g>

  <!-- ===== arrows to sources ===== -->
  <g stroke="#4FA47D" stroke-width="2" fill="none">
    <line x1="256" y1="209" x2="556" y2="120"/>
    <line x1="276" y1="243" x2="556" y2="190"/>
    <line x1="266" y1="277" x2="556" y2="260"/>
  </g>
  <g fill="#4FA47D">
    <polygon points="556,120 546,118 549,127"/>
    <polygon points="556,190 546,188 548,197"/>
    <polygon points="556,260 546,258 548,267"/>
  </g>

  <!-- source doc icons -->
  <g>
    <rect x="556" y="100" width="186" height="42" rx="6" fill="#79C3E8" stroke="#2456A4"/>
    <text x="649" y="120" font-size="11.5" font-weight="700" fill="#0b3a52" text-anchor="middle">원본 센서 로그</text>
    <text x="649" y="135" font-size="10" fill="#0b3a52" text-anchor="middle">(C-1·계통 노드)</text>

    <rect x="556" y="170" width="186" height="42" rx="6" fill="#79C3E8" stroke="#2456A4"/>
    <text x="649" y="190" font-size="11.5" font-weight="700" fill="#0b3a52" text-anchor="middle">원본 정비 기준서</text>
    <text x="649" y="205" font-size="10" fill="#0b3a52" text-anchor="middle">(p.5로 바로 이동)</text>

    <rect x="556" y="240" width="186" height="42" rx="6" fill="#79C3E8" stroke="#2456A4"/>
    <text x="649" y="260" font-size="11.5" font-weight="700" fill="#0b3a52" text-anchor="middle">과거 조치 이력</text>
    <text x="649" y="275" font-size="10" fill="#0b3a52" text-anchor="middle">(원천 데이터셋)</text>
  </g>

  <!-- caption -->
  <text x="556" y="306" font-size="11" fill="#3a4a55">근거를 누르면 원본을 열어 확인하고,</text>
  <text x="556" y="322" font-size="11" fill="#3a4a55">계통을 따라 원천까지 역추적한다.</text>
</svg>
