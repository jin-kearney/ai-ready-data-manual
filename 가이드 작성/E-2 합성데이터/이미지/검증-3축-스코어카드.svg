<svg viewBox="0 0 820 336" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="336" fill="#ffffff"/>
  <text x="24" y="32" font-size="17" font-weight="700" fill="#10243f">합성데이터 검증 리포트 — 세 축으로 본다 (가상)</text>
  <text x="24" y="52" font-size="11.5" fill="#6b7785">생성한 합성데이터는 세 축을 모두 통과해야 활용한다</text>

  <!-- ===== Card 1 : 충실도 ===== -->
  <rect x="28" y="68" width="244" height="206" rx="8" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.4"/>
  <path d="M28,76 a8,8 0 0 1 8,-8 h228 a8,8 0 0 1 8,8 v28 h-244 z" fill="#2456A4"/>
  <text x="44" y="94" font-size="13.5" font-weight="700" fill="#ffffff">충실도 (Fidelity)</text>
  <text x="44" y="124" font-size="11.5" fill="#6b7785">실데이터와 유사한가</text>
  <g font-size="11.5" fill="#10243f">
    <text x="44" y="150">분포 유사도(KS)</text><text x="256" y="150" text-anchor="end" font-weight="700">0.94</text>
    <text x="44" y="174">상관관계 보존</text><text x="256" y="174" text-anchor="end" font-weight="700">0.91</text>
    <text x="44" y="198">희소 패턴 재현</text><text x="256" y="198" text-anchor="end" font-weight="700">양호</text>
  </g>
  <rect x="44" y="224" width="64" height="24" rx="12" fill="#4FA47D"/>
  <text x="76" y="240" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">통과</text>

  <!-- ===== Card 2 : 유용성 ===== -->
  <rect x="289" y="68" width="244" height="206" rx="8" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.4"/>
  <path d="M289,76 a8,8 0 0 1 8,-8 h228 a8,8 0 0 1 8,8 v28 h-244 z" fill="#3F9BD4"/>
  <text x="305" y="94" font-size="13.5" font-weight="700" fill="#ffffff">유용성 (Utility)</text>
  <text x="305" y="124" font-size="11.5" fill="#6b7785">학습에 실제로 기여하는가</text>
  <g font-size="11.5" fill="#10243f">
    <text x="305" y="150">TSTR — 합성으로 학습,</text>
    <text x="305" y="167">실데이터로 시험</text>
    <text x="305" y="196">불량 검출(Recall)</text>
    <text x="517" y="196" text-anchor="end" font-weight="700" fill="#2f6b50">0.71 → 0.84</text>
  </g>
  <rect x="305" y="224" width="64" height="24" rx="12" fill="#4FA47D"/>
  <text x="337" y="240" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">개선</text>

  <!-- ===== Card 3 : 프라이버시 ===== -->
  <rect x="550" y="68" width="244" height="206" rx="8" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.4"/>
  <path d="M550,76 a8,8 0 0 1 8,-8 h228 a8,8 0 0 1 8,8 v28 h-244 z" fill="#4FA47D"/>
  <text x="566" y="94" font-size="13.5" font-weight="700" fill="#ffffff">프라이버시 (Privacy)</text>
  <text x="566" y="124" font-size="11.5" fill="#6b7785">원본이 노출되지 않는가</text>
  <g font-size="11.5" fill="#10243f">
    <text x="566" y="150">최근접 거리(DCR)</text><text x="778" y="150" text-anchor="end" font-weight="700">통과</text>
    <text x="566" y="174">재식별 위험</text><text x="778" y="174" text-anchor="end" font-weight="700">낮음</text>
    <text x="566" y="198">작업자·Lot ID</text><text x="778" y="198" text-anchor="end" font-weight="700">제외·일반화</text>
  </g>
  <rect x="566" y="224" width="64" height="24" rx="12" fill="#4FA47D"/>
  <text x="598" y="240" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">통과</text>

  <!-- 하단 판단 규칙 -->
  <rect x="28" y="294" width="766" height="30" rx="6" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="411" y="313" font-size="11.5" fill="#10243f" text-anchor="middle">세 축을 모두 통과해야 활용한다. 하나라도 미달이면 생성 방식을 바꾸거나 다시 생성한다.</text>
</svg>
