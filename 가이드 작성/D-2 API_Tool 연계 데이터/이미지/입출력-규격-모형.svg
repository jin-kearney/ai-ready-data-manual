<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="360" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">입출력 규격 — 넣을 값과 나올 값의 약속 (가상 예시)</text>

  <!-- INPUT table -->
  <text x="40" y="64" font-size="13" font-weight="700" fill="#2456A4">입력 규격 (input)</text>
  <g font-size="11" fill="#10243f">
    <rect x="40" y="74" width="440" height="26" fill="#DCE8F5" stroke="#6B9AD1"/>
    <line x1="190" y1="74" x2="190" y2="204" stroke="#6B9AD1"/>
    <line x1="268" y1="74" x2="268" y2="204" stroke="#6B9AD1"/>
    <line x1="338" y1="74" x2="338" y2="204" stroke="#6B9AD1"/>
    <text x="52" y="91" font-weight="700">파라미터</text>
    <text x="200" y="91" font-weight="700">타입</text>
    <text x="278" y="91" font-weight="700">필수</text>
    <text x="348" y="91" font-weight="700">허용값 · 예시</text>
    <rect x="40" y="100" width="440" height="104" fill="none" stroke="#6B9AD1"/>
    <line x1="40" y1="126" x2="480" y2="126" stroke="#d7e0ea"/>
    <line x1="40" y1="152" x2="480" y2="152" stroke="#d7e0ea"/>
    <line x1="40" y1="178" x2="480" y2="178" stroke="#d7e0ea"/>
    <text x="52" y="117">robotSerial</text><text x="200" y="117">string</text><text x="278" y="117" font-weight="700" fill="#2456A4">필수</text><text x="348" y="117">"DR-A0512"</text>
    <text x="52" y="143">fromDate</text><text x="200" y="143">date</text><text x="278" y="143" font-weight="700" fill="#2456A4">필수</text><text x="348" y="143">"2026-05-01"</text>
    <text x="52" y="169">toDate</text><text x="200" y="169">date</text><text x="278" y="169" font-weight="700" fill="#2456A4">필수</text><text x="348" y="169">"2026-05-31"</text>
    <text x="52" y="195">severity</text><text x="200" y="195">enum</text><text x="278" y="195" fill="#6b7785">선택</text><text x="348" y="195">INFO · WARN · CRITICAL</text>
  </g>

  <!-- OUTPUT box -->
  <text x="40" y="240" font-size="13" font-weight="700" fill="#2456A4">출력 규격 (output)</text>
  <rect x="40" y="250" width="440" height="74" rx="4" fill="#f3f6fa" stroke="#dbe3ec"/>
  <text x="54" y="272" font-size="10.5" fill="#3a4a55" font-family="ui-monospace, monospace">alarms: [ { code, name, occurredAt, axis,</text>
  <text x="54" y="290" font-size="10.5" fill="#3a4a55" font-family="ui-monospace, monospace">           severity } ]</text>
  <text x="54" y="312" font-size="10.5" fill="#3a4a55" font-family="ui-monospace, monospace">error: { code: "RANGE_TOO_WIDE", message }</text>

  <!-- annotations -->
  <line x1="300" y1="117" x2="540" y2="96" stroke="#2456A4" stroke-width="1.2"/>
  <text x="548" y="92" font-size="12" font-weight="700" fill="#2456A4">필수·타입</text>
  <text x="548" y="108" font-size="11.5" fill="#3a4a55">필수값이 비거나 타입이 다르면</text>
  <text x="548" y="124" font-size="11.5" fill="#3a4a55">호출 자체를 거부한다</text>

  <line x1="430" y1="195" x2="540" y2="176" stroke="#C9663A" stroke-width="1.2"/>
  <text x="548" y="172" font-size="12" font-weight="700" fill="#C9663A">허용값(enum)</text>
  <text x="548" y="188" font-size="11.5" fill="#3a4a55">고르는 값만 받아, 에이전트가</text>
  <text x="548" y="204" font-size="11.5" fill="#3a4a55">오타·임의 값으로 못 부른다</text>

  <line x1="430" y1="312" x2="540" y2="300" stroke="#4FA47D" stroke-width="1.3"/>
  <text x="548" y="296" font-size="12" font-weight="700" fill="#2f6b50">오류 응답</text>
  <text x="548" y="312" font-size="11.5" fill="#3a4a55">실패도 정해진 코드로 돌려줘야</text>
  <text x="548" y="328" font-size="11.5" fill="#3a4a55">에이전트가 다음 행동을 정한다</text>

  <text x="40" y="348" font-size="11" fill="#6b7785">입출력 규격은 사람이 읽는 설명이 아니라 기계가 검사하는 약속이다. JSON Schema로 적으면 자동 검증된다.</text>
</svg>
