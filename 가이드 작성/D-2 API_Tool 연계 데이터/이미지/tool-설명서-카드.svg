<svg viewBox="0 0 760 350" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="350" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">Tool 설명서 — 에이전트가 읽고 고르는 글 (가상 예시)</text>

  <!-- card -->
  <rect x="40" y="50" width="440" height="276" rx="6" fill="#ffffff" stroke="#c9d4e0" stroke-width="1.5"/>
  <rect x="40" y="50" width="440" height="34" rx="6" fill="#DCE8F5" stroke="#6B9AD1"/>
  <text x="56" y="72" font-size="13.5" font-weight="700" fill="#10243f">getRobotAlarms</text>
  <text x="464" y="72" font-size="11" fill="#3a4a55" text-anchor="end">조회형 · v1.2.0</text>

  <g font-size="12">
    <text x="56" y="108" font-weight="700" fill="#2456A4">기능</text>
    <text x="120" y="108" fill="#10243f">지정한 로봇의 최근 알람 이력을 조회한다</text>

    <text x="56" y="138" font-weight="700" fill="#2456A4">목적</text>
    <text x="120" y="138" fill="#10243f">현장 알람 원인 분석의 1차 데이터 확보</text>

    <text x="56" y="168" font-weight="700" fill="#2456A4">입력</text>
    <text x="120" y="168" fill="#10243f">robotSerial · fromDate · toDate · severity</text>

    <text x="56" y="198" font-weight="700" fill="#2456A4">출력</text>
    <text x="120" y="198" fill="#10243f">alarms[] (code · name · occurredAt · axis)</text>

    <text x="56" y="228" font-weight="700" fill="#2456A4">제약</text>
    <text x="120" y="228" fill="#10243f">최대 90일 범위 · 1회 최대 500건</text>

    <text x="56" y="258" font-weight="700" fill="#2456A4">호출 예시</text>
  </g>
  <rect x="56" y="268" width="408" height="44" rx="4" fill="#f3f6fa" stroke="#dbe3ec"/>
  <text x="68" y="285" font-size="10.5" fill="#3a4a55" font-family="ui-monospace, monospace">getRobotAlarms(robotSerial="DR-A0512",</text>
  <text x="68" y="301" font-size="10.5" fill="#3a4a55" font-family="ui-monospace, monospace">  fromDate="2026-05-01", toDate="2026-05-31")</text>

  <!-- annotations -->
  <line x1="396" y1="108" x2="540" y2="100" stroke="#2456A4" stroke-width="1.2"/>
  <text x="548" y="98" font-size="12" font-weight="700" fill="#2456A4">기능·목적 = 선택 근거</text>
  <text x="548" y="114" font-size="11.5" fill="#3a4a55">에이전트는 이 글을 읽고</text>
  <text x="548" y="130" font-size="11.5" fill="#3a4a55">"이 도구를 부를까"를 판단한다</text>

  <line x1="300" y1="228" x2="540" y2="196" stroke="#C9663A" stroke-width="1.2"/>
  <text x="548" y="190" font-size="12" font-weight="700" fill="#C9663A">제약을 비우면</text>
  <text x="548" y="206" font-size="11.5" fill="#3a4a55">한도 없이 호출해 시스템에</text>
  <text x="548" y="222" font-size="11.5" fill="#3a4a55">부하를 줄 수 있다</text>

  <line x1="300" y1="290" x2="540" y2="280" stroke="#4FA47D" stroke-width="1.3"/>
  <text x="548" y="276" font-size="12" font-weight="700" fill="#2f6b50">호출 예시 1건</text>
  <text x="548" y="292" font-size="11.5" fill="#3a4a55">올바른 호출 모습을 보여</text>
  <text x="548" y="308" font-size="11.5" fill="#3a4a55">엉뚱한 호출을 줄인다</text>
</svg>
