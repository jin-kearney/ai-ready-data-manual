<svg viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="760" height="330" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">Tool 위험도 4등급과 사람 승인 게이트 (가상 예시)</text>

  <!-- ladder rows: bottom = low risk, top = high risk -->
  <!-- 외부 전송형 (top) -->
  <rect x="50" y="60" width="430" height="44" rx="4" fill="#163a73" stroke="#0b1f3f"/>
  <text x="66" y="80" font-size="13" font-weight="700" fill="#ffffff">외부 전송형</text>
  <text x="66" y="96" font-size="11.5" fill="#cdddf2">예: orderSparePart (협력사 발주) · 승인 + 금액 한도</text>

  <!-- 실행형 -->
  <rect x="50" y="112" width="430" height="44" rx="4" fill="#2456A4" stroke="#163a73"/>
  <text x="66" y="132" font-size="13" font-weight="700" fill="#ffffff">실행형 (쓰기)</text>
  <text x="66" y="148" font-size="11.5" fill="#cdddf2">예: createWorkOrder (작업지시 생성) · 실행 전 사람 승인</text>

  <!-- gate line -->
  <line x1="50" y1="172" x2="660" y2="172" stroke="#C9663A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="265" y="168" font-size="11.5" font-weight="700" fill="#C9663A" text-anchor="middle">사람 승인 게이트</text>

  <!-- 추천형 -->
  <rect x="50" y="180" width="430" height="44" rx="4" fill="#79C3E8" stroke="#3F9BD4"/>
  <text x="66" y="200" font-size="13" font-weight="700" fill="#0b3a52">추천형 (제안)</text>
  <text x="66" y="216" font-size="11.5" fill="#0b3a52">예: suggestFix (조치안 제시) · 자동 호출 · 기록</text>

  <!-- 조회형 (bottom) -->
  <rect x="50" y="232" width="430" height="44" rx="4" fill="#B7CDE6" stroke="#6B9AD1"/>
  <text x="66" y="252" font-size="13" font-weight="700" fill="#10243f">조회형 (읽기만)</text>
  <text x="66" y="268" font-size="11.5" fill="#10243f">예: getRobotAlarms (알람 조회) · 자동 호출</text>

  <!-- arrow: rising risk -->
  <line x1="34" y1="276" x2="34" y2="64" stroke="#6b7785" stroke-width="1.4" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="2" orient="auto"><path d="M0,0 L8,2 L0,4 z" fill="#6b7785"/></marker></defs>
  <text x="22" y="170" font-size="11" fill="#6b7785" transform="rotate(-90 22 170)" text-anchor="middle">위험도(부작용)가 커진다</text>

  <!-- right annotations -->
  <path d="M484,194 H520 V150 H484" fill="none" stroke="#4FA47D" stroke-width="1.3"/>
  <text x="528" y="166" font-size="12" font-weight="700" fill="#2f6b50">게이트 아래</text>
  <text x="528" y="182" font-size="11.5" fill="#3a4a55">되돌릴 수 있음 → 자동 호출</text>

  <path d="M484,134 H520 V90 H484" fill="none" stroke="#2456A4" stroke-width="1.3"/>
  <text x="528" y="106" font-size="12" font-weight="700" fill="#2456A4">게이트 위</text>
  <text x="528" y="122" font-size="11.5" fill="#3a4a55">사고·되돌리기 어려움 → 사람 승인</text>

  <text x="50" y="304" font-size="11" fill="#6b7785">등급은 Tool 명세에 메타데이터로 적어 두고, 승인 규칙도 명세와 함께 데이터로 관리한다.</text>
</svg>
