<svg viewBox="0 0 820 334" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="334" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">판정 기록이 라벨이 된다 — 같은 시간축이면 조인만으로 연결 (가상)</text>

  <!-- label band -->
  <rect x="480" y="80" width="130" height="196" fill="#C2E6D6" opacity="0.45" stroke="#7CC2A7" stroke-dasharray="5 3"/>
  <text x="545" y="72" font-size="12.5" font-weight="700" fill="#2f6b50" text-anchor="middle">"불량 발생 전 구간" 라벨 자동 연결</text>

  <!-- NG marker -->
  <line x1="610" y1="80" x2="610" y2="282" stroke="#d64545" stroke-width="1.7"/>
  <text x="620" y="96" font-size="12.5" font-weight="700" fill="#b32020">검사 판정 NG — 09:07:31Z</text>

  <!-- Row 1: vibration signal -->
  <text x="40" y="128" font-size="12.5" fill="#10243f">진동 (CNC-03)</text>
  <line x1="140" y1="150" x2="780" y2="150" stroke="#eef2f7"/>
  <polyline fill="none" stroke="#2456A4" stroke-width="2"
    points="140,150 200,148 260,152 320,149 380,151 440,147 480,140 520,128 560,112 600,96 610,92 630,150 690,152 750,150 780,151"/>

  <!-- Row 2: video filmstrip -->
  <text x="40" y="212" font-size="12.5" fill="#10243f">영상 (CAM-03)</text>
  <g fill="#ffffff" stroke="#6B9AD1">
    <rect x="140" y="190" width="56" height="42"/>
    <rect x="205" y="190" width="56" height="42"/>
    <rect x="270" y="190" width="56" height="42"/>
    <rect x="335" y="190" width="56" height="42"/>
    <rect x="400" y="190" width="56" height="42"/>
    <rect x="465" y="190" width="56" height="42"/>
    <rect x="530" y="190" width="56" height="42"/>
    <rect x="660" y="190" width="56" height="42"/>
    <rect x="725" y="190" width="56" height="42"/>
  </g>
  <rect x="595" y="190" width="56" height="42" fill="#fdeeee" stroke="#d64545" stroke-width="1.6"/>
  <text x="623" y="216" font-size="11" fill="#b32020" text-anchor="middle">NG 프레임</text>

  <!-- time axis -->
  <line x1="140" y1="282" x2="780" y2="282" stroke="#c9d4e0" stroke-width="1.2"/>
  <text x="640" y="300" font-size="11" fill="#6b7785">공통 시간축 (UTC) →</text>

  <text x="24" y="322" font-size="11.5" fill="#3a4a55">시간축·설비ID가 정렬되어 있어 판정 기록과의 조인만으로 라벨 후보가 생긴다 — 검수·세부 라벨은 B-2가 맡는다.</text>
</svg>
