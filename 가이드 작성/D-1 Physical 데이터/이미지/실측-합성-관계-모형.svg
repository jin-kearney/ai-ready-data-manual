<svg viewBox="0 0 820 302" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="302" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">실측이 기준점, 합성은 빈 곳만 채운다 (개념)</text>

  <!-- axes -->
  <line x1="80" y1="240" x2="760" y2="240" stroke="#c9d4e0" stroke-width="1.2"/>
  <line x1="80" y1="66" x2="80" y2="240" stroke="#c9d4e0" stroke-width="1.2"/>
  <text x="40" y="62" font-size="11" fill="#6b7785">사례 수</text>

  <!-- measured bars -->
  <rect x="145" y="90" width="70" height="150" fill="#79C3E8" stroke="#3F9BD4"/>
  <rect x="305" y="155" width="70" height="85" fill="#79C3E8" stroke="#3F9BD4"/>
  <rect x="465" y="224" width="70" height="16" fill="#79C3E8" stroke="#3F9BD4"/>
  <rect x="625" y="232" width="70" height="8" fill="#79C3E8" stroke="#3F9BD4"/>

  <!-- synthetic top-ups on rare cases -->
  <rect x="465" y="164" width="70" height="60" fill="#C2E6D6" stroke="#4FA47D" stroke-dasharray="5 3"/>
  <rect x="625" y="160" width="70" height="72" fill="#C2E6D6" stroke="#4FA47D" stroke-dasharray="5 3"/>

  <!-- category labels -->
  <g font-size="12" fill="#10243f" text-anchor="middle">
    <text x="180" y="260">정상 운전</text>
    <text x="340" y="260">경미 이상</text>
    <text x="500" y="260">고장 전조 A</text>
    <text x="660" y="260">고장 전조 B</text>
  </g>

  <!-- legend -->
  <rect x="250" y="76" width="12" height="12" fill="#79C3E8" stroke="#3F9BD4"/>
  <text x="268" y="86" font-size="12" fill="#10243f">실측 데이터</text>
  <rect x="250" y="98" width="12" height="12" fill="#C2E6D6" stroke="#4FA47D" stroke-dasharray="4 2"/>
  <text x="268" y="108" font-size="12" fill="#10243f">합성 보강 (E-2)</text>

  <!-- validation arrow -->
  <line x1="215" y1="130" x2="458" y2="160" stroke="#2f6b50" stroke-width="1.3"/>
  <polygon points="466,161 454,155 453,166" fill="#2f6b50"/>
  <text x="255" y="128" font-size="12" fill="#2f6b50">실측의 분포·물리적 특성과 대조해 검증</text>

  <text x="80" y="290" font-size="12" fill="#2f6b50">정상 데이터는 합성하지 않는다 — 실측으로 부족한 희소 사례만 채운다. 생성·검증·표시는 E-2가 맡는다.</text>
</svg>
