<svg viewBox="0 0 820 258" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="258" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">물리 데이터의 세 유형 — 점에서 면, 형상과 물리적 특성까지 (개념)</text>

  <!-- Panel 1: 신호 -->
  <text x="145" y="64" font-size="14" font-weight="700" fill="#2456A4" text-anchor="middle">① 신호</text>
  <text x="145" y="82" font-size="11.5" fill="#3a4a55" text-anchor="middle">한 지점의 값 × 시간</text>
  <line x1="60" y1="200" x2="230" y2="200" stroke="#c9d4e0" stroke-width="1.2"/>
  <line x1="60" y1="105" x2="60" y2="200" stroke="#c9d4e0" stroke-width="1.2"/>
  <polyline fill="none" stroke="#2456A4" stroke-width="2"
    points="60,152 80,146 100,155 120,148 140,153 160,147 180,152 200,148 230,151"/>
  <text x="145" y="218" font-size="11" fill="#6b7785" text-anchor="middle">온도·진동·전류 시계열</text>

  <!-- arrow 1 -->
  <line x1="248" y1="150" x2="288" y2="150" stroke="#6B9AD1" stroke-width="2"/>
  <polygon points="296,150 285,144 285,156" fill="#6B9AD1"/>

  <!-- Panel 2: 영상 -->
  <text x="410" y="64" font-size="14" font-weight="700" fill="#2456A4" text-anchor="middle">② 영상</text>
  <text x="410" y="82" font-size="11.5" fill="#3a4a55" text-anchor="middle">면(화면) × 시간</text>
  <rect x="336" y="116" width="148" height="86" fill="#f3f6fa" stroke="#c9d4e0"/>
  <rect x="328" y="108" width="148" height="86" fill="#eaf1fa" stroke="#9db8d6"/>
  <rect x="320" y="100" width="148" height="86" fill="#ffffff" stroke="#6B9AD1" stroke-width="1.5"/>
  <line x1="320" y1="143" x2="468" y2="143" stroke="#eef2f7"/>
  <line x1="394" y1="100" x2="394" y2="186" stroke="#eef2f7"/>
  <rect x="352" y="128" width="34" height="24" fill="#79C3E8" stroke="#3F9BD4"/>
  <circle cx="432" cy="158" r="5" fill="none" stroke="#d64545" stroke-width="1.6"/>
  <text x="410" y="218" font-size="11" fill="#6b7785" text-anchor="middle">카메라·열화상 — 프레임이 시간으로 이어짐</text>

  <!-- arrow 2 -->
  <line x1="512" y1="150" x2="552" y2="150" stroke="#6B9AD1" stroke-width="2"/>
  <polygon points="560,150 549,144 549,156" fill="#6B9AD1"/>

  <!-- Panel 3: 3D·4D -->
  <text x="680" y="64" font-size="14" font-weight="700" fill="#2456A4" text-anchor="middle">③ 3D·4D</text>
  <text x="680" y="82" font-size="11.5" fill="#3a4a55" text-anchor="middle">형상 + 물리적 특성</text>
  <polygon points="640,132 700,132 700,178 640,178" fill="#B7CDE6" stroke="#6B9AD1" stroke-width="1.3"/>
  <polygon points="640,132 660,120 720,120 700,132" fill="#DCE8F5" stroke="#6B9AD1" stroke-width="1.3"/>
  <polygon points="700,132 720,120 720,166 700,178" fill="#9db8d6" stroke="#6B9AD1" stroke-width="1.3"/>
  <!-- forces -->
  <line x1="670" y1="155" x2="670" y2="112" stroke="#2456A4" stroke-width="2.2"/>
  <polygon points="670,104 665,115 675,115" fill="#2456A4"/>
  <line x1="670" y1="155" x2="670" y2="198" stroke="#4FA47D" stroke-width="2.2"/>
  <polygon points="670,206 665,195 675,195" fill="#4FA47D"/>
  <line x1="670" y1="155" x2="736" y2="155" stroke="#3F9BD4" stroke-width="2.2"/>
  <polygon points="744,155 733,150 733,160" fill="#3F9BD4"/>
  <text x="752" y="159" font-size="11" fill="#2456A4">힘</text>
  <text x="680" y="218" font-size="11" fill="#6b7785" text-anchor="middle">디지털 트윈·점군 + 하중·물성·시간 변화</text>

  <text x="24" y="246" font-size="12" fill="#2f6b50">유형이 넓어져도 공통 기준(시간·단위·설비ID·맥락)은 동일하게 적용된다.</text>
</svg>
