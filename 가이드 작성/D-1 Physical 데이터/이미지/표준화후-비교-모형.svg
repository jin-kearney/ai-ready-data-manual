<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
  <rect width="820" height="300" fill="#ffffff"/>
  <text x="24" y="30" font-size="17" font-weight="700" fill="#10243f">공통 기준을 맞춘 뒤 — 세 설비를 한 화면에서 비교 (가상)</text>

  <!-- plot frame -->
  <line x1="62" y1="60" x2="62" y2="235" stroke="#c9d4e0" stroke-width="1.2"/>
  <line x1="62" y1="235" x2="775" y2="235" stroke="#c9d4e0" stroke-width="1.2"/>
  <text x="24" y="54" font-size="11" fill="#6b7785">온도 (℃, 공통 단위)</text>
  <text x="560" y="255" font-size="11" fill="#6b7785">공통 시간축 (UTC, 1분 간격) →</text>

  <!-- gridline -->
  <line x1="62" y1="160" x2="775" y2="160" stroke="#eef2f7" stroke-width="1"/>
  <text x="38" y="164" font-size="10" fill="#9aa7b4">80</text>

  <!-- CNC-01 (blue) -->
  <polyline fill="none" stroke="#2456A4" stroke-width="2"
    points="62,162 140,160 220,163 300,159 380,162 460,160 540,162 620,161 700,160 775,162"/>
  <!-- CNC-02 (mid blue) -->
  <polyline fill="none" stroke="#5B8AC9" stroke-width="2"
    points="62,170 140,168 220,171 300,167 380,170 460,168 540,170 620,169 700,168 775,170"/>
  <!-- CNC-03 (green) — rises at right = anomaly -->
  <polyline fill="none" stroke="#4FA47D" stroke-width="2.4"
    points="62,166 140,165 220,167 300,164 380,166 460,159 540,146 620,126 700,106 775,96"/>

  <!-- anomaly callout -->
  <circle cx="700" cy="106" r="5" fill="none" stroke="#d64545" stroke-width="1.8"/>
  <line x1="700" y1="106" x2="610" y2="92" stroke="#d64545" stroke-width="1.2"/>
  <text x="430" y="89" font-size="12" fill="#b32020" font-weight="700">CNC-03 온도 상승 — 이상 징후를 즉시 감지</text>

  <!-- legend -->
  <g font-size="12" fill="#10243f">
    <line x1="624" y1="58" x2="648" y2="58" stroke="#2456A4" stroke-width="3"/><text x="654" y="62">CNC-01</text>
    <line x1="624" y1="74" x2="648" y2="74" stroke="#5B8AC9" stroke-width="3"/><text x="654" y="78">CNC-02</text>
    <line x1="624" y1="90" x2="648" y2="90" stroke="#4FA47D" stroke-width="3"/><text x="654" y="94">CNC-03</text>
  </g>

  <text x="24" y="285" font-size="12" fill="#2f6b50">시간·단위·설비ID를 맞췄기에 세 설비를 같은 축에 겹쳐 비교하고, 한 설비의 이상을 바로 가려낼 수 있다.</text>
</svg>
