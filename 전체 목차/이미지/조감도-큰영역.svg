<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" fill="#1e293b">
  <rect width="1600" height="900" fill="#ffffff"/>
  <defs>
    <marker id="fl" markerWidth="9" markerHeight="9" refX="6.2" refY="4" orient="auto"><path d="M1,1 L6.5,4 L1,7" fill="none" stroke="#475569" stroke-width="1.7"/></marker>
    <marker id="sv" markerWidth="9" markerHeight="9" refX="6.2" refY="4" orient="auto"><path d="M1,1 L6.5,4 L1,7" fill="none" stroke="#2563eb" stroke-width="1.7"/></marker>
    <marker id="fb" markerWidth="9" markerHeight="9" refX="6.2" refY="4" orient="auto"><path d="M1,1 L6.5,4 L1,7" fill="none" stroke="#f59e0b" stroke-width="1.7"/></marker>
    <marker id="bs" markerWidth="9" markerHeight="9" refX="6.2" refY="4" orient="auto"><path d="M1,1 L6.5,4 L1,7" fill="none" stroke="#94a3b8" stroke-width="1.5"/></marker>
  </defs>

  <text x="40" y="40" font-size="23" font-weight="700">AI-Ready Data 20개 가이드 — 전체 조감도 (큰 영역 관계)</text>
  <text x="560" y="40" font-size="12.5" fill="#64748b">원천 → 수집·전처리 → 의미·맥락 → 품질·계보 → AI Agent · 전 과정은 데이터 운영 기준을 따른다</text>

  <!-- 상단 관계 호 -->
  <path d="M678,110 C678,72 1318,72 1318,256" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#sv)"/>
  <text x="998" y="66" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="3.5">③ 의미·맥락 → AI 근거 (RAG·GraphRAG)</text>
  <path d="M1318,104 C1318,50 418,50 418,108" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-dasharray="7 4" marker-end="url(#fb)"/>
  <text x="860" y="44" font-size="12" font-weight="600" fill="#d97706" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="3.5">환류: ⑤ 평가·피드백 → ②·④ 데이터·품질·Prompt 개선</text>

  <!-- 메인 흐름 화살표 -->
  <path d="M276,350 L300,350" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#fl)"/>
  <path d="M536,350 L560,350" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#fl)"/>
  <path d="M796,350 L820,350" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#fl)"/>
  <path d="M1056,350 L1080,350" fill="none" stroke="#475569" stroke-width="2.6" marker-end="url(#fl)"/>

  <!-- ① 원천 데이터 -->
  <rect x="40" y="110" width="236" height="490" rx="12" fill="#ffffff" stroke="#475569" stroke-width="1.8"/>
  <text x="158" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#475569">① 원천 데이터</text>
  <line x1="60" y1="152" x2="256" y2="152" stroke="#cbd5e1"/>
  <rect x="58" y="170" width="200" height="46" rx="7" fill="#f8fafc" stroke="#cbd5e1"/><text x="158" y="198" text-anchor="middle" font-size="12.5">업무시스템 ERP·MES</text>
  <rect x="58" y="226" width="200" height="46" rx="7" fill="#f8fafc" stroke="#cbd5e1"/><text x="158" y="254" text-anchor="middle" font-size="12.5">설비·센서 PLC·SCADA</text>
  <rect x="58" y="282" width="200" height="46" rx="7" fill="#f8fafc" stroke="#cbd5e1"/><text x="158" y="310" text-anchor="middle" font-size="12.5">문서·도면 SharePoint</text>
  <rect x="58" y="338" width="200" height="46" rx="7" fill="#f8fafc" stroke="#cbd5e1"/><text x="158" y="366" text-anchor="middle" font-size="12.5">아날로그 종이·수기</text>
  <text x="158" y="560" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">현장·시스템·문서의 원본</text>

  <!-- ② 수집·전처리 -->
  <rect x="300" y="110" width="236" height="490" rx="12" fill="#ffffff" stroke="#0d9488" stroke-width="1.8"/>
  <text x="418" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#0d9488">② 수집·전처리</text>
  <line x1="320" y1="152" x2="516" y2="152" stroke="#99f6e4"/>
  <rect x="318" y="170" width="200" height="44" rx="7" fill="#f0fdfa" stroke="#5eead4"/><text x="418" y="197" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0d9488">F-3</tspan> 디지털화</text>
  <rect x="318" y="222" width="200" height="44" rx="7" fill="#f0fdfa" stroke="#5eead4"/><text x="418" y="249" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0d9488">D-1</tspan> Physical</text>
  <rect x="318" y="274" width="200" height="44" rx="7" fill="#f0fdfa" stroke="#5eead4"/><text x="418" y="301" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0d9488">B-1</tspan> 전처리</text>
  <rect x="318" y="326" width="200" height="44" rx="7" fill="#f0fdfa" stroke="#5eead4"/><text x="418" y="353" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0d9488">B-2</tspan> 해설·주석</text>
  <rect x="318" y="378" width="200" height="44" rx="7" fill="#f0fdfa" stroke="#5eead4"/><text x="418" y="405" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0d9488">E-2</tspan> 합성데이터</text>
  <text x="418" y="560" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">AI가 읽을 형태로</text>

  <!-- ③ 의미·맥락 부여 -->
  <rect x="560" y="110" width="236" height="490" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="678" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">③ 의미·맥락 부여</text>
  <line x1="580" y1="152" x2="776" y2="152" stroke="#bfdbfe"/>
  <rect x="578" y="170" width="200" height="46" rx="7" fill="#eff6ff" stroke="#93c5fd"/><text x="678" y="198" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#2563eb">A-1</tspan> 카탈로그</text>
  <rect x="578" y="226" width="200" height="46" rx="7" fill="#eff6ff" stroke="#93c5fd"/><text x="678" y="254" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#2563eb">A-2</tspan> 메타데이터</text>
  <rect x="578" y="282" width="200" height="46" rx="7" fill="#eff6ff" stroke="#93c5fd"/><text x="678" y="310" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#2563eb">A-3</tspan> Glossary</text>
  <rect x="578" y="338" width="200" height="46" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/><text x="678" y="366" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#7c3aed">B-3</tspan> 온톨로지</text>
  <text x="678" y="560" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">소재·속성·뜻으로 찾고 해석</text>

  <!-- ④ 품질·계보 관리 -->
  <rect x="820" y="110" width="236" height="490" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="1.8"/>
  <text x="938" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">④ 품질·계보 관리</text>
  <line x1="840" y1="152" x2="1036" y2="152" stroke="#fde68a"/>
  <rect x="838" y="170" width="200" height="46" rx="7" fill="#fffbeb" stroke="#fcd34d"/><text x="938" y="198" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#d97706">C-2</tspan> 품질 판정</text>
  <rect x="838" y="226" width="200" height="46" rx="7" fill="#fffbeb" stroke="#fcd34d"/><text x="938" y="254" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#d97706">C-1</tspan> Observability</text>
  <rect x="838" y="282" width="200" height="46" rx="7" fill="#fffbeb" stroke="#fcd34d"/><text x="938" y="310" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#d97706">C-3</tspan> Lineage</text>
  <rect x="838" y="338" width="200" height="46" rx="7" fill="#f8fafc" stroke="#cbd5e1"/><text x="938" y="366" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#475569">F-4</tspan> 권한·보안</text>
  <text x="938" y="560" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">쓸 수 있나 판정·근거</text>

  <!-- ⑤ AI 활용 -->
  <rect x="1080" y="110" width="476" height="490" rx="12" fill="#fff7f7" stroke="#be123c" stroke-width="1.8"/>
  <text x="1318" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#be123c">⑤ AI 활용</text>
  <line x1="1100" y1="152" x2="1536" y2="152" stroke="#fecaca"/>
  <rect x="1100" y="170" width="436" height="62" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="1318" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">실행</text>
  <text x="1318" y="216" text-anchor="middle" font-size="12">D-3 Prompt · D-2 API/Tool</text>
  <rect x="1158" y="266" width="320" height="96" rx="10" fill="#be123c" stroke="#881337" stroke-width="2"/>
  <text x="1318" y="306" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">AI Agent</text>
  <text x="1318" y="330" text-anchor="middle" font-size="11.5" fill="#fecdd3">RAG · Tool · Harness</text>
  <rect x="1100" y="396" width="436" height="62" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1318" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#ea580c">평가 · 환류</text>
  <text x="1318" y="442" text-anchor="middle" font-size="12">E-3 평가 · E-4 Feedback</text>
  <path d="M1318,232 L1318,264" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#sv)"/>
  <path d="M1318,362 L1318,394" fill="none" stroke="#f59e0b" stroke-width="2.2" marker-end="url(#fb)"/>
  <text x="1318" y="560" text-anchor="middle" font-size="11.5" fill="#64748b" font-style="italic">에이전트가 실행하고 결과를 평가·환류</text>

  <!-- ⑥ 데이터 운영 기준 (받침) -->
  <rect x="40" y="636" width="1516" height="120" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="60" y="668" font-size="15" font-weight="700" fill="#16a34a">⑥ 데이터 운영 기준 — 전 과정 받침</text>
  <rect x="60" y="686" width="280" height="52" rx="7" fill="#ffffff" stroke="#86efac"/><text x="200" y="717" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#16a34a">F-1</tspan> DataOps · 흐름 안 멈추게</text>
  <rect x="356" y="686" width="280" height="52" rx="7" fill="#ffffff" stroke="#86efac"/><text x="496" y="717" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#16a34a">F-2</tspan> 생애주기 · 언제까지 두나</text>
  <rect x="652" y="686" width="300" height="52" rx="7" fill="#ffffff" stroke="#7dd3fc"/><text x="802" y="717" text-anchor="middle" font-size="12.5"><tspan font-weight="700" fill="#0ea5e9">E-1</tspan> 데이터 Product화 · 재사용</text>
  <text x="1240" y="703" text-anchor="middle" font-size="12" fill="#16a34a">운영 기준이 수집·품질 등 전 과정에 적용된다</text>
  <text x="1240" y="722" text-anchor="middle" font-size="11" fill="#64748b">(점선 = 전 영역 받침)</text>
  <path d="M418,636 C418,618 418,612 418,602" fill="none" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#bs)"/>
  <path d="M938,636 C938,618 938,612 938,602" fill="none" stroke="#16a34a" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#bs)"/>

  <!-- 범례 -->
  <line x1="40" y1="800" x2="74" y2="800" stroke="#475569" stroke-width="2.6" marker-end="url(#fl)"/><text x="82" y="804" font-size="11.5" fill="#475569">데이터 흐름</text>
  <line x1="240" y1="800" x2="274" y2="800" stroke="#2563eb" stroke-width="2.6" marker-end="url(#sv)"/><text x="282" y="804" font-size="11.5" fill="#475569">AI에 근거·도구 제공</text>
  <line x1="500" y1="800" x2="534" y2="800" stroke="#f59e0b" stroke-width="2.6" stroke-dasharray="7 4" marker-end="url(#fb)"/><text x="542" y="804" font-size="11.5" fill="#475569">평가·피드백 환류</text>
  <line x1="740" y1="800" x2="774" y2="800" stroke="#16a34a" stroke-width="2.4" stroke-dasharray="3 3" marker-end="url(#bs)"/><text x="782" y="804" font-size="11.5" fill="#475569">운영 기준 받침(전 과정)</text>
  <text x="1556" y="804" text-anchor="end" font-size="11" fill="#94a3b8">각 영역의 가이드 상세·내부 관계는 §2 역할표·§3 묶음별 뜯어보기</text>
</svg>
