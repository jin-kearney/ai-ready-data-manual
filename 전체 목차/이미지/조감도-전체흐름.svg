<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" fill="#10243f">
  <rect width="1280" height="720" fill="#ffffff"/>
  <defs>
    <marker id="aflow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2456A4"/></marker>
    <marker id="aloop" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4FA47D"/></marker>
    <marker id="asup" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7CC2A7"/></marker>
  </defs>

  <text x="640" y="40" text-anchor="middle" font-weight="700" font-size="22">AI-Ready Data 20개 가이드 — 읽는 순서와 목적 한눈에</text>
  <text x="640" y="66" text-anchor="middle" font-size="12.5" fill="#44607f">왼쪽 데이터 원천 → 오른쪽 AI Agent · 번호 = 권장 읽기 순서(데이터 흐름 순) · 처음이라면 ②부터, ①·⑥은 상황에 따라</text>

  <path d="M1150,228 Q 700,84 440,150" fill="none" stroke="#4FA47D" stroke-width="2.6" marker-end="url(#aloop)"/>
  <text x="700" y="100" text-anchor="middle" font-size="11.5" fill="#2f6b50" font-weight="700">⑥ 지속·평가·개선 — 운영 결과를 E-3 평가·E-4 Feedback이 원인 주제로 환류 · E-1 Product화로 재사용</text>

  <rect x="20" y="230" width="104" height="140" rx="10" fill="#79C3E8" stroke="#3F9BD4"/>
  <text x="72" y="292" text-anchor="middle" font-weight="700" font-size="13" fill="#0b3a52">데이터 원천</text>
  <text x="72" y="312" text-anchor="middle" font-size="9" fill="#0b3a52">현장·설비</text>
  <text x="72" y="326" text-anchor="middle" font-size="9" fill="#0b3a52">문서·도면</text>
  <text x="72" y="340" text-anchor="middle" font-size="9" fill="#0b3a52">시스템 기록</text>

  <rect x="140" y="155" width="178" height="290" rx="10" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="229" y="180" text-anchor="middle" font-weight="700" font-size="12.5" fill="#2456A4">① 원천 확보·디지털화</text>
  <text x="229" y="203" text-anchor="middle" font-size="10.5" fill="#2f6b50" font-style="italic">데이터를 '있게' 만든다</text>
  <rect x="150" y="222" width="158" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="229" y="245" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">F-3</tspan> 데이터 디지털화</text>
  <rect x="150" y="266" width="158" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="229" y="289" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">D-1</tspan> Physical 데이터</text>
  <rect x="150" y="310" width="158" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="229" y="333" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">E-2</tspan> 합성데이터</text>

  <rect x="334" y="155" width="192" height="290" rx="10" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="430" y="180" text-anchor="middle" font-weight="700" font-size="12.5" fill="#2456A4">② 찾고, 뜻을 안다</text>
  <text x="430" y="203" text-anchor="middle" font-size="10.5" fill="#2f6b50" font-style="italic">소재·속성·뜻으로 찾고 해석</text>
  <rect x="344" y="222" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="430" y="245" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">A-1</tspan> 데이터 카탈로그</text>
  <rect x="344" y="266" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="430" y="289" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">A-2</tspan> 메타데이터</text>
  <rect x="344" y="310" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="430" y="333" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">A-3</tspan> 비즈니스 Glossary</text>
  <rect x="344" y="354" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="430" y="377" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">B-3</tspan> 온톨로지</text>

  <rect x="542" y="155" width="150" height="290" rx="10" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="617" y="180" text-anchor="middle" font-weight="700" font-size="12.5" fill="#2456A4">③ AI가 읽게 가공</text>
  <text x="617" y="203" text-anchor="middle" font-size="10.5" fill="#2f6b50" font-style="italic">읽을 형태·의미로</text>
  <rect x="552" y="222" width="130" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="617" y="245" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">B-1</tspan> 데이터 전처리</text>
  <rect x="552" y="266" width="130" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="617" y="289" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">B-2</tspan> 해설·주석</text>

  <rect x="708" y="155" width="192" height="290" rx="10" fill="#EEF4FB" stroke="#2456A4" stroke-width="1.8"/>
  <text x="804" y="180" text-anchor="middle" font-weight="700" font-size="12.5" fill="#2456A4">④ 믿고 쓰기 — 게이트</text>
  <text x="804" y="203" text-anchor="middle" font-size="10.5" fill="#2f6b50" font-style="italic">쓸 수 있나 판정·통제</text>
  <rect x="718" y="222" width="172" height="36" rx="6" fill="#ffffff" stroke="#3F9BD4"/><text x="804" y="245" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">C-2</tspan> 데이터 품질 관리</text>
  <rect x="718" y="266" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="804" y="289" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">C-1</tspan> Observability</text>
  <rect x="718" y="310" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="804" y="333" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">C-3</tspan> 계통 Lineage</text>
  <rect x="718" y="354" width="172" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="804" y="377" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">F-4</tspan> 권한·보안</text>

  <rect x="916" y="155" width="146" height="290" rx="10" fill="#EEF4FB" stroke="#6B9AD1"/>
  <text x="989" y="180" text-anchor="middle" font-weight="700" font-size="12.5" fill="#2456A4">⑤ 에이전트로 실행</text>
  <text x="989" y="203" text-anchor="middle" font-size="10.5" fill="#2f6b50" font-style="italic">도구·절차로 실행</text>
  <rect x="926" y="222" width="126" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="989" y="245" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">D-2</tspan> API/Tool 연계</text>
  <rect x="926" y="266" width="126" height="36" rx="6" fill="#ffffff" stroke="#B7CDE6"/><text x="989" y="289" text-anchor="middle" font-size="11"><tspan font-weight="700" fill="#2456A4">D-3</tspan> Prompt·Harness</text>

  <rect x="1090" y="230" width="120" height="140" rx="16" fill="#2456A4" stroke="#163a73" stroke-width="2"/>
  <text x="1150" y="296" text-anchor="middle" font-weight="700" font-size="17" fill="#ffffff">AI Agent</text>
  <text x="1150" y="316" text-anchor="middle" font-size="9.5" fill="#DCE8F5">RAG · 에이전트</text>

  <line x1="124" y1="300" x2="138" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>
  <line x1="318" y1="300" x2="332" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>
  <line x1="526" y1="300" x2="540" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>
  <line x1="692" y1="300" x2="706" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>
  <line x1="900" y1="300" x2="914" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>
  <text x="908" y="291" text-anchor="middle" font-size="9.5" fill="#2456A4">통과만</text>
  <line x1="1062" y1="300" x2="1088" y2="300" stroke="#2456A4" stroke-width="2.4" marker-end="url(#aflow)"/>

  <rect x="20" y="475" width="1190" height="66" rx="10" fill="#C2E6D6" stroke="#7CC2A7" stroke-dasharray="5 4"/>
  <text x="615" y="503" text-anchor="middle" font-weight="700" font-size="12.5" fill="#1f4d3a">⑦ 전 과정 받침 — 운영·수명 (RFP 범위 외)</text>
  <text x="615" y="523" text-anchor="middle" font-size="11" fill="#1f4d3a">F-1 데이터 운영관리 (흐름 안 멈추게) · F-2 데이터 생애주기 관리 (언제까지 두고 버리나)</text>
  <line x1="229" y1="473" x2="229" y2="447" stroke="#7CC2A7" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#asup)"/>
  <line x1="617" y1="473" x2="617" y2="447" stroke="#7CC2A7" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#asup)"/>
  <line x1="989" y1="473" x2="989" y2="447" stroke="#7CC2A7" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#asup)"/>

  <text x="640" y="588" text-anchor="middle" font-size="11.5" fill="#44607f">묶음은 데이터가 흐르는 '하는 일'(관계)로 나눴습니다 — 같은 일을 하는 가이드끼리. 각 묶음의 초록 글씨가 '왜 보는지(목적)'입니다.</text>
