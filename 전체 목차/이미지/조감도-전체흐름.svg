  <text x="40" y="40" font-size="24" fill="#1e293b" font-weight="700">AI-Ready Data 20개 가이드 — 전체 조감도</text>
  <text x="470" y="40" font-size="13" fill="#64748b">아래(데이터 원천)에서 위(AI Agent)로 흐르고, 평가·피드백이 되돌아온다 · 색 = 흐름 종류 · 번호 = 권장 읽기 순서</text>

